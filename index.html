<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>DermaDecode — Dr. Bengi Su Ege</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --sky: #c8dff0;
  --sky-light: #e8f3fb;
  --blossom: #f2c4ce;
  --blossom-deep: #e8a0b0;
  --white: #fefefe;
  --cream: #fdf9f7;
  --ink: #1a1520;
  --ink-mid: #5a4f60;
  --ink-light: #9b90a0;
  --safe: #4a9e6e;
  --safe-light: #d8f0e4;
  --caution: #c8882a;
  --caution-light: #faecd8;
  --risky: #c04060;
  --risky-light: #fce4e8;
  --unknown: #808098;
  --unknown-light: #eceaf4;
  --shadow-sm: 0 2px 8px rgba(26,21,32,0.06), 0 1px 3px rgba(26,21,32,0.04);
  --shadow-md: 0 8px 24px rgba(26,21,32,0.08), 0 2px 8px rgba(26,21,32,0.05);
  --shadow-lg: 0 20px 50px rgba(26,21,32,0.10), 0 8px 20px rgba(26,21,32,0.06);
  --shadow-xl: 0 32px 80px rgba(26,21,32,0.14), 0 12px 32px rgba(26,21,32,0.08);
  --r: 16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;overflow-x:hidden;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── BACKGROUND ─────────────────────────────── */
#bg{
  position:fixed;inset:0;z-index:0;
  background:
    linear-gradient(180deg,
      var(--sky-light) 0%,
      #d8ecf8 25%,
      #ecddf0 55%,
      #f5e8ee 75%,
      var(--cream) 100%
    );
  overflow:hidden;
}
#bg-photo{
  position:absolute;inset:0;
  background-image:url('bg.jpg');
  background-size:cover;
  background-position:center 40%;
  opacity:0.75;
}
#bg-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(255,250,252,0.10) 0%,
    rgba(255,248,250,0.15) 40%,
    rgba(253,249,247,0.60) 72%,
    rgba(253,249,247,0.92) 100%
  );
}

/* ── PETALS ─────────────────────────────────── */
.petal{
  position:absolute;
  top:-20px;
  border-radius:50% 50% 50% 50%/30% 30% 70% 70%;
  opacity:0;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:0;}
  5%{opacity:.9;}
  95%{opacity:.6;}
  100%{transform:translateY(105vh) rotate(480deg) translateX(60px);opacity:0;}
}

/* ── NAV ────────────────────────────────────── */
#nav{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;
  background:rgba(254,254,254,0.96);
  border-bottom:1px solid rgba(200,180,210,0.15);
  box-shadow:0 1px 0 rgba(200,180,210,0.1), var(--shadow-sm);
}
.logo{
  display:flex;align-items:center;gap:14px;
  background:none;border:none;cursor:pointer;
}
.logo-mark{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(145deg,#f2c4ce,#c8dff0);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:var(--shadow-md);
  flex-shrink:0;
}
.logo-text{
  display:flex;flex-direction:column;gap:1px;
  text-align:left;
}
.logo-name{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;
  color:var(--ink);letter-spacing:-0.01em;line-height:1;
}
.logo-sub{
  font-size:11px;color:var(--ink-light);
  letter-spacing:0.04em;font-weight:300;
}
.nav-tabs{display:flex;gap:4px;align-items:center;}
.nav-tab{
  padding:8px 16px;border-radius:100px;border:none;
  background:transparent;color:var(--ink-mid);
  font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.nav-tab:hover{background:rgba(242,196,206,0.2);color:var(--ink);}
.nav-tab.active{
  background:var(--ink);color:var(--white);
  box-shadow:var(--shadow-sm);
}
.nav-doctor{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;border-radius:100px;
  background:var(--cream);
  border:1px solid rgba(200,180,210,0.2);
  box-shadow:var(--shadow-sm);
}
.nav-doctor-name{font-size:13px;font-weight:600;color:var(--ink);}
.nav-doctor-title{font-size:10px;color:var(--ink-light);letter-spacing:0.04em;}

/* ── MOBILE NAV ─────────────────────────────── */
#mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(254,254,254,0.94);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(200,180,210,0.15);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  box-shadow:0 -4px 20px rgba(26,21,32,0.08);
}
.mob-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--ink-light);font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;padding:4px 0;transition:color .2s;
}
.mob-tab.active{color:var(--ink);}
.mob-tab-icon{font-size:20px;line-height:1;}
@media(max-width:680px){
  #nav .nav-tabs,#nav .nav-doctor{display:none!important;}
  #nav{padding:14px 20px;}
  #mobile-nav{display:flex;}
  #main{padding:20px 16px 90px!important;}
  .two-col{grid-template-columns:1fr!important;}
  .five-col{grid-template-columns:repeat(3,1fr)!important;}
  .three-col{grid-template-columns:1fr!important;}
  .logo-name{font-size:18px;}
}

/* ── MAIN ───────────────────────────────────── */
#main{
  position:relative;z-index:1;
  max-width:860px;margin:0 auto;
  padding:32px 24px 60px;
}

/* ── CARD ───────────────────────────────────── */
.card{
  background:var(--white);
  border-radius:var(--r);
  box-shadow:var(--shadow-md);
  overflow:hidden;
  border:1px solid rgba(200,180,210,0.12);
  transition:box-shadow .25s;
}
.card-head{
  padding:22px 28px 18px;
  border-bottom:1px solid rgba(200,180,210,0.12);
  background:linear-gradient(135deg,rgba(242,196,206,0.08) 0%,rgba(200,223,240,0.08) 100%);
}
.card-head-label{
  font-size:11px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;
}
.card-head-title{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;color:var(--ink);line-height:1.2;
}
.card-body{padding:24px 28px;}

/* ── BUTTON ─────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 24px;border-radius:100px;border:none;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn-primary{
  background:var(--ink);color:var(--white);
  box-shadow:var(--shadow-sm);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-ghost{
  background:transparent;color:var(--ink-mid);
  border:1.5px solid rgba(200,180,210,0.4);
}
.btn-ghost:hover{background:rgba(242,196,206,0.12);color:var(--ink);}
.btn-sm{padding:8px 18px;font-size:13px;}
.btn-full{width:100%;display:flex;}

/* ── INPUT ──────────────────────────────────── */
.input{
  width:100%;padding:12px 16px;
  border:1.5px solid rgba(200,180,210,0.3);
  border-radius:12px;
  background:var(--cream);
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.input:focus{
  border-color:var(--blossom-deep);
  box-shadow:0 0 0 3px rgba(232,160,176,0.15);
}
.input::placeholder{color:var(--ink-light);}
textarea.input{resize:vertical;min-height:100px;line-height:1.6;}

/* ── SEARCH DROPDOWN ─────────────────────────── */
.sugg-box{
  position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:40;
  background:var(--white);
  border:1.5px solid rgba(200,180,210,0.25);
  border-radius:14px;
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  max-height:280px;overflow-y:auto;
}
.sugg-item{
  padding:12px 18px;cursor:pointer;
  border-bottom:1px solid rgba(200,180,210,0.1);
  transition:background .15s;
}
.sugg-item:last-child{border-bottom:none;}
.sugg-item:hover{background:rgba(242,196,206,0.1);}
.sugg-name{font-size:14px;font-weight:500;color:var(--ink);}
.sugg-brand{font-size:12px;color:var(--blossom-deep);margin-top:2px;}

/* ── CHIP ───────────────────────────────────── */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:100px;
  font-size:12px;font-weight:500;
  background:var(--cream);color:var(--ink-mid);
  border:1px solid rgba(200,180,210,0.2);
  cursor:pointer;transition:all .15s;
}
.chip.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
.chip:hover:not(.active){background:rgba(242,196,206,0.15);}

/* ── SCORE BAR ──────────────────────────────── */
.score-bar{
  height:6px;border-radius:100px;
  background:rgba(200,180,210,0.15);overflow:hidden;
}
.score-fill{
  height:100%;border-radius:100px;
  transition:width 1s cubic-bezier(.4,0,.2,1);
}

/* ── INGREDIENT ROW ─────────────────────────── */
.ing-row{
  display:grid;
  grid-template-columns:28px 1fr 90px 52px;
  align-items:center;gap:12px;
  padding:14px 28px;
  border-bottom:1px solid rgba(200,180,210,0.08);
  cursor:pointer;transition:background .15s;
}
.ing-row:last-child{border-bottom:none;}
.ing-row:hover{background:rgba(242,196,206,0.06);}
.ing-row.active{background:rgba(242,196,206,0.1);}

/* ── HOME CARDS ─────────────────────────────── */
.home-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:16px;
}
.home-card{
  border-radius:20px;padding:28px 22px;
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;
  text-align:left;color:var(--white);
  position:relative;overflow:hidden;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
}
.home-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%);
}
.home-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-xl);}
.home-card-icon{font-size:36px;margin-bottom:14px;display:block;}
.home-card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;margin-bottom:6px;line-height:1.2;
}
.home-card-desc{font-size:13px;opacity:.85;line-height:1.5;}

/* ── PROMISE ROW ─────────────────────────────── */
.promise-row{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 0;
  border-bottom:1px solid rgba(200,180,210,0.1);
}
.promise-row:last-child{border-bottom:none;}
.promise-label{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.promise-detail{font-size:12px;color:var(--ink-light);}
.verdict{
  font-size:12px;font-weight:700;padding:5px 14px;
  border-radius:100px;white-space:nowrap;flex-shrink:0;
}

/* ── CONFLICT BOX ───────────────────────────── */
.conflict-item{
  padding:16px 20px;border-radius:12px;
  margin-bottom:10px;
}
.conflict-item:last-child{margin-bottom:0;}

/* ── QUIZ OPTION ─────────────────────────────── */
.quiz-opt{
  width:100%;padding:14px 20px;border-radius:14px;
  border:1.5px solid rgba(200,180,210,0.2);
  background:var(--cream);
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);
  cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;
  transition:all .2s;
}
.quiz-opt:hover{
  border-color:var(--blossom-deep);
  background:rgba(242,196,206,0.08);
  transform:translateX(4px);
}
.quiz-letter{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
  background:linear-gradient(135deg,var(--blossom),var(--sky));
  color:var(--ink);
}

/* ── ROUTINE STEP ────────────────────────────── */
.routine-step{
  padding:16px 24px;
  border-bottom:1px solid rgba(200,180,210,0.1);
}
.routine-step:last-child{border-bottom:none;}
.step-number{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-light);margin-bottom:4px;
}
.step-name{font-size:15px;font-weight:500;color:var(--ink);}
.step-brand{font-size:12px;color:var(--blossom-deep);margin-top:2px;}

/* ── SKIN GRID ───────────────────────────────── */
.skin-cell{text-align:center;padding:8px 4px;}
.skin-score{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:600;line-height:1;margin-bottom:6px;
}
.skin-label{font-size:11px;color:var(--ink-light);font-weight:500;}

/* ── BADGE ───────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:100px;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  background:linear-gradient(135deg,rgba(242,196,206,0.3),rgba(200,223,240,0.3));
  color:var(--ink-mid);border:1px solid rgba(200,180,210,0.2);
}

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:none;}
}
@keyframes breathe{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.04);}
}
.fade-up{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;}

/* ── DISCLAIMER ──────────────────────────────── */
#modal{
  position:fixed;inset:0;z-index:100;
  background:rgba(26,21,32,0.5);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal-box{
  background:var(--white);border-radius:24px;
  max-width:440px;width:100%;
  box-shadow:var(--shadow-xl);
  overflow:hidden;
}

#bg-photo::after,
.unsplash-credit,
[data-testid="attribution"],
a[href*="unsplash.com"]:not(.logo) {
  display:none!important;
}
#bg-photo {
  overflow:hidden;
}
</style>
</head>
<body>

<div id="bg">
  <div id="bg-photo"></div>
  <div id="bg-overlay"></div>
</div>

<!-- Petals injected by JS -->

<nav id="nav">
  <button class="logo" onclick="goHome()">
    <div class="logo-mark">🌸</div>

      <div class="logo-name">DermaDecode</div>
      <div class="logo-sub">by Dr. Bengi Su Ege</div>

  <div class="nav-tabs" id="navTabs"></div>

  <div class="nav-doctor">

</nav>

<div id="main"></div>

<nav id="mobile-nav" style="display:none"></nav>

function lookupIngredient(raw, index, total) {
  const key = raw.trim().toLowerCase().replace(/\*/g,"");
  let found = DB[key];
  if (!found) { for (const [k,v] of Object.entries(DB)) { if (key.includes(k)||k.includes(key)){found=v;break;} } }
  const base = found||{tr:raw.trim(),cat:"Bilinmeyen",rating:"unknown",score:50,desc:"Veritabanında bilgi yok.",concern:null,comedogenic:0,skinTypes:["all"],usage:"Bilgi yok.",avoid:[]};
  const pct=index/total;
  const position=pct<0.15?"Yüksek":pct<0.4?"Orta-Yüksek":pct<0.65?"Orta":pct<0.85?"Düşük":"Eser";
  const positionNote=pct<0.15?"Üst sıralarda — yüksek konsantrasyon":pct<0.4?"İlk yarıda — orta-yüksek":pct<0.65?"Ortada — orta":pct<0.85?"İkinci yarıda — düşük":"Sonda — genellikle <%1";
  return {name:raw.trim(),position,positionNote,listIndex:index+1,...base};
}
function parseIngredients(text){
  const items=text.split(/[,\n;]+/).map(s=>s.trim()).filter(Boolean);
  return items.map((item,i)=>lookupIngredient(item,i,items.length));
}

  {a:["glycolic acid","salicylic acid","lactic acid","mandelic acid"],b:["glycolic acid","salicylic acid","lactic acid","mandelic acid"],severity:"medium",icon:"🟡",title:"Çoklu Asit",tip:"Aynı rutinde birden fazla güçlü asit aşırı irritasyon riski. Tek bir exfoliant seç."},
  {a:["alcohol denat","alcohol"],b:["retinol","ascorbic acid","niacinamide"],severity:"medium",icon:"🟡",title:"Alkol + Aktif Bileşenler",tip:"Alkol aktif bileşenlerin etkinliğini azaltabilir ve iritasyon artırabilir."},
  {a:["fragrance","parfum"],b:["retinol","retinal","glycolic acid","salicylic acid","ascorbic acid"],severity:"medium",icon:"🟡",title:"Parfüm + Güçlü Aktifler",tip:"Parfüm hassas ve aktif içerikli ürünlerde ekstra iritasyon riski."},
];

function detectConflicts(items){
  const keys=items.map(i=>i.name.toLowerCase());
  const found=[];
  for(const c of CONFLICTS){
    const hasA=c.a.some(a=>keys.some(k=>k.includes(a)||a.includes(k)));
    const hasB=c.b.some(b=>keys.some(k=>k.includes(b)||b.includes(k)));
    if(hasA&&hasB){
      // find actual ingredient names
      const aNames=items.filter(i=>c.a.some(a=>i.name.toLowerCase().includes(a)||a.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const bNames=items.filter(i=>c.b.some(b=>i.name.toLowerCase().includes(b)||b.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const key=c.title;
      if(!found.find(f=>f.title===key)) found.push({...c,aNames:[...new Set(aNames)],bNames:[...new Set(bNames)]});
    }
  }
  return found;
}

// Compact product data [name, brand, cat, ingredients]
function calcScore(items){
  if(!items||!items.length)return 0;
  const w=items.map(ing=>{
    let s=ing.rating==="unknown"?45:ing.score;
    if(ing.vitaminCTier===3)s=Math.min(s,72);
    const wt=ing.rating==="risky"?1.5:1;
    return{s,wt};
  });
  const tw=w.reduce((a,b)=>a+b.wt,0);
  return Math.round(w.reduce((a,b)=>a+b.s*b.wt,0)/tw);
}

function searchProds(q,cb){
  if(!q||q.trim().length<2){cb([]);return;}
  const ql=q.toLowerCase().trim(),words=ql.split(/\s+/);
  cb(ST.products.map(p=>{
    const h=(p.name+' '+p.brand+' '+(p.cat||'')).toLowerCase();
    let s=0;
    if(h.includes(ql))s+=100;
    words.forEach(w=>{if(h.includes(w))s+=20;});
    if(p.brand.toLowerCase().includes(ql))s+=40;
    if(p.name.toLowerCase().startsWith(ql))s+=30;
    return{...p,_s:s};
  }).filter(p=>p._s>0).sort((a,b)=>b._s-a._s).slice(0,8));
}

const SM=["Temizleyici","Tonik","C Vitamini","Serum","Göz Kremi","Nemlendirici","Güneş Koruma"];
const SE=["Yağ Temizleyici","Temizleyici","Tonik","Asit/Peeling","Serum","Retinoid","Göz Kremi","Nemlendirici","Onarıcı"];
function gTime(p){const n=(p.name+' '+(p.cat||'')).toLowerCase();if(/spf|sunscreen|güneş/.test(n))return'am';if(/gece|night|retinol|retinal|aha|bha|peeling/.test(n))return'pm';if(/cleansing oil|oil cleanser/.test(n))return'pm';return'both';}
function gStep(p,s){const n=(p.name+' '+(p.cat||'')).toLowerCase();if(/spf|sunscreen|güneş/.test(n))return'Güneş Koruma';if(/retinol|retinal|retinoid/.test(n))return'Retinoid';if(/cleansing oil|balm/.test(n))return'Yağ Temizleyici';if(/cleanser|temizleyici|foam|micellar|wash/.test(n))return'Temizleyici';if(/eye|göz/.test(n))return'Göz Kremi';if(/toner|tonik|essence|esans/.test(n))return'Tonik';if(/peeling|aha|bha/.test(n))return'Asit/Peeling';if(s==='am'&&/ascorbic|vitamin c/.test(n))return'C Vitamini';if(/serum|ampoule/.test(n))return'Serum';if(/ointment|onarıcı/.test(n))return'Onarıcı';return'Nemlendirici';}
function gActs(parsed){const k=parsed.map(i=>i.name.toLowerCase());const has=t=>t.some(x=>k.some(ki=>ki.includes(x)));return{ret:has(['retinol','retinal','granactive']),vitC:has(['ascorbic acid','3-o-ethyl']),aha:has(['glycolic','lactic acid','mandelic']),bha:has(['salicylic acid']),nia:has(['niacinamide']),bp:has(['benzoyl peroxide'])};}

function buildRoutine(){
  if(!ST.routineProds.length)return;
  const tagged=ST.routineProds.map(p=>({...p,time:gTime(p),act:gActs(p.parsed)}));
  const srt=(l,steps)=>l.sort((a,b)=>{const ai=steps.indexOf(a.step),bi=steps.indexOf(b.step);return(ai<0?99:ai)-(bi<0?99:bi);});
  const am=srt(tagged.filter(p=>p.time==='am'||p.time==='both').map(p=>({...p,step:gStep(p,'am')})),SM);
  const pm=srt(tagged.filter(p=>p.time==='pm'||p.time==='both').map(p=>({...p,step:gStep(p,'pm')})),SE);
  const warns=[];
  am.filter(p=>p.act.ret).forEach(p=>warns.push({sev:'high',msg:'"'+p.name+'" retinoid — sadece akşam kullanılmalı.'}));
  const pA=pm.filter(p=>p.act.aha||p.act.bha),pR=pm.filter(p=>p.act.ret);
  if(pA.length&&pR.length)warns.push({sev:'high',msg:'Asit + Retinoid aynı gece — farklı gecelere ayır.'});
  const vC=tagged.filter(p=>p.act.vitC),nia=tagged.filter(p=>p.act.nia);
  if(vC.length&&nia.length)warns.push({sev:'medium',msg:'C vitamini + Niasinamid: yüksek dozda sararma riski.'});
  const tips=[];
  if(pR.length)tips.push('Retinoid kullanırken sabah mutlaka SPF uygula.');
  if(!am.some(p=>/spf|sunscreen|güneş/.test((p.name+p.cat).toLowerCase())))tips.push('Sabah rutininde SPF görünmüyor — aktif kullanıyorsan şart.');
  if(vC.length)tips.push('C vitaminini sabah kullan — antioksidan koruması gündüz kritik.');
  ST.routineResult={am,pm,warns,tips};
  render();
}

      const state=label==='A'?ST.cmpA:ST.cmpB;

      col.appendChild(makeSearchField(
        'Ürün ara…',state.q,
        v=>{setSt({q:v});searchProds(v,ss=>{setSt({suggs:ss});render();});render();},
        p=>{setSt({q:p.name,suggs:[],input:p.ingredients,results:parseIngredients(p.ingredients)});render();},

      const ta=el('textarea','input');ta.placeholder='veya INCI listesi yapıştır…';ta.rows=4;ta.value=state.input||'';
      ta.addEventListener('input',e=>setSt({input:e.target.value}));col.appendChild(ta);
      col.appendChild(div('','')).style.height='10px';
      const analyzeBtn=el('button','btn btn-primary btn-full');analyzeBtn.textContent='Analiz Et →';
      analyzeBtn.onclick=()=>{setSt({results:parseIngredients(state.input)});render();};
      analyzeBtn.disabled=!state.input;col.appendChild(analyzeBtn);
      grid.appendChild(col);

  root.appendChild(wrap);

  const A=ST.cmpA.results,B=ST.cmpB.results;

  root.appendChild(div('','')).style.height='16px';

  // Score comparison
  const scoreGrid=div('two-col');scoreGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;';
  const sA=calcScore(A),sB=calcScore(B);

    const name=div('');name.style.cssText='font-size:12px;color:var(--ink-light);margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';name.textContent=state.q||'Manuel giriş';
    const num=div('');num.style.cssText="font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:600;color:"+col+";line-height:1;margin-bottom:4px;";num.textContent=String(sc);

    const bar=div('score-bar');const fill=div('score-fill');fill.style.cssText='width:'+sc+'%;background:'+col+';';bar.appendChild(fill);
    card2.append(lbl,name,num,sub,bar);scoreGrid.appendChild(card2);
  });

  // Winner

    const winner=div('card fade-up');winner.style.cssText='padding:20px;text-align:center;margin-bottom:16px;background:linear-gradient(135deg,rgba(242,196,206,0.12),rgba(200,223,240,0.12));';
    winner.innerHTML='<div style="font-size:32px;margin-bottom:8px">🏆</div><div style="font-family:\'Cormorant Garamond\',serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:4px">Ürün '+(sA>sB?'A':'B')+' öne çıkıyor</div><div style="font-size:13px;color:var(--ink-light)">Fark: '+Math.abs(sA-sB)+' puan</div>';
    root.appendChild(winner);
  }

  // Diff

    const divider2=div('card-head-label');divider2.textContent='VEYA MANUEL EKLE';body.appendChild(divider2);
    body.appendChild(div('','')).style.height='8px';
    const mRow=div('');mRow.style.cssText='display:grid;grid-template-columns:1fr 2fr auto;gap:10px;align-items:center;';
    const nameI=el('input','input');nameI.placeholder='Ürün adı';nameI.value=ST.manualName||'';
    nameI.addEventListener('input',e=>ST.manualName=e.target.value);
    const ingI=el('input','input');ingI.placeholder='Water, Glycerin…';ingI.value=ST.manualIng||'';
    ingI.addEventListener('input',e=>ST.manualIng=e.target.value);
    const addBtn=el('button','btn btn-primary btn-sm');addBtn.textContent='Ekle';
    addBtn.onclick=()=>{
      const n=nameI.value.trim(),i=ingI.value.trim();
      if(!n||!i)return;
      ST.routineProds=[...ST.routineProds,{name:n,brand:'',cat:'',ingredients:i,parsed:parseIngredients(i)}];
      ST.manualName='';ST.manualIng='';ST.routineResult=null;render();
    };
    mRow.append(nameI,ingI,addBtn);body.appendChild(mRow);
  });
  root.appendChild(addCard);

  if(!ST.routineProds.length)return;

  root.appendChild(div('','')).style.height='16px';

  // Product list
  const listCard2=div('card fade-up');listCard2.style.marginBottom='16px';
  const listHead2=div('card-head');
  const lLabel=div('card-head-label');lLabel.textContent='EKLENEN ÜRÜNLER';
  const lTitle=div('card-head-title');lTitle.textContent=ST.routineProds.length+' ürün';
  listHead2.append(lLabel,lTitle);listCard2.appendChild(listHead2);
  ST.routineProds.forEach((p,i)=>{
    const row=div('routine-step');row.style.display='flex';row.style.alignItems='center';row.style.gap='14px';
    const icon3=div('');icon3.style.cssText='font-size:18px;flex-shrink:0;';icon3.textContent=gTime(p)==='am'?'🌅':gTime(p)==='pm'?'🌙':'🌿';
    const info=div('');info.style.flex='1';
    const nm=div('step-name');nm.textContent=p.name;
    const br=div('step-brand');if(p.brand)br.textContent=p.brand;
    info.append(nm,br);
    const rm=el('button','btn btn-ghost btn-sm');rm.textContent='×';rm.style.padding='6px 10px';
    rm.onclick=()=>{ST.routineProds=ST.routineProds.filter((_,j)=>j!==i);ST.routineResult=null;render();};
    row.append(icon3,info,rm);listCard2.appendChild(row);
  });
  const buildBtn=div('');buildBtn.style.padding='16px 24px';buildBtn.style.borderTop='1px solid rgba(200,180,210,0.1)';
  const bb=el('button','btn btn-primary btn-full');bb.textContent='🌿 Rutini Oluştur';bb.onclick=buildRoutine;
  buildBtn.appendChild(bb);listCard2.appendChild(buildBtn);
  root.appendChild(listCard2);

  if(!ST.routineResult)return;

  const rr=ST.routineResult;

  // Warnings
  if(rr.warns.length){
    const wCard=div('card fade-up');wCard.style.marginBottom='16px';
    const wHead=div('card-head');
    const wLbl=div('card-head-label');wLbl.textContent='UYARI';
    const wTitle=div('card-head-title');wTitle.textContent='⚡ '+rr.warns.length+' Çakışma';
    wHead.append(wLbl,wTitle);wCard.appendChild(wHead);
    const wBody=div('card-body');
    rr.warns.forEach(w=>{
      const item=div('conflict-item');item.style.background=w.sev==='high'?'var(--risky-light)':'var(--caution-light)';
      item.style.border='1px solid '+(w.sev==='high'?'rgba(192,64,96,0.15)':'rgba(200,136,42,0.15)');
      item.innerHTML='<div style="font-size:12px;font-weight:700;color:'+(w.sev==='high'?'var(--risky)':'var(--caution)')+';margin-bottom:4px">'+(w.sev==='high'?'⚡ Yüksek Risk':'⚠ Orta Risk')+'</div><div style="font-size:13px;color:var(--ink-mid);line-height:1.6">'+w.msg+'</div>';
      wBody.appendChild(item);
    });
    wCard.appendChild(wBody);root.appendChild(wCard);
  }

  // AM/PM grid
  const rGrid=div('two-col');rGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;';
  [{lb:'🌅 Sabah Rutini',list:rr.am},{lb:'🌙 Akşam Rutini',list:rr.pm}].forEach(({lb,list})=>{
    const c=div('card fade-up');
    const h=div('card-head');const t=div('card-head-title');t.textContent=lb;h.appendChild(t);c.appendChild(h);
    if(!list.length){const em=div('card-body');em.style.cssText='font-size:13px;color:var(--ink-light);text-align:center;';em.textContent='Bu seans için ürün yok.';c.appendChild(em);}
    list.forEach((p,i)=>{
      const row=div('routine-step');
      const sn=div('step-number');sn.textContent=(i+1)+'. '+p.step;
      const nm=div('step-name');nm.textContent=p.name;
      const br=div('step-brand');if(p.brand)br.textContent=p.brand;
      const tags=div('');tags.style.cssText='display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;';
      if(p.act.ret){const t=div('chip');t.style.cssText='color:var(--unknown);border-color:rgba(128,128,152,0.2);font-size:10px;padding:2px 8px;';t.textContent='Retinoid';tags.appendChild(t);}
      if(p.act.aha||p.act.bha){const t=div('chip');t.style.cssText='color:var(--caution);border-color:rgba(200,136,42,0.2);font-size:10px;padding:2px 8px;';t.textContent='Asit';tags.appendChild(t);}
      if(p.act.vitC){const t=div('chip');t.style.cssText='color:var(--safe);border-color:rgba(74,158,110,0.2);font-size:10px;padding:2px 8px;';t.textContent='C Vitamini';tags.appendChild(t);}
      row.append(sn,nm,br,tags);c.appendChild(row);
    });
    rGrid.appendChild(c);
  });
  root.appendChild(rGrid);

  // Tips
  if(rr.tips.length){
    const tipCard=makeCard('UZMAN İPUÇLARI','',body=>{
      rr.tips.forEach(t=>{
        const row=div('');row.style.cssText='font-size:13px;color:var(--ink-mid);padding:10px 16px;border-radius:10px;background:rgba(200,223,240,0.12);border-left:3px solid var(--sky);margin-bottom:8px;line-height:1.6;';
        row.textContent=t;body.appendChild(row);
      });
    });
    tipCard.classList.add('fade-up');root.appendChild(tipCard);
  }

  if(!rr.warns.length){
    const ok=div('card');ok.style.cssText='padding:16px 20px;text-align:center;font-size:14px;font-weight:500;color:var(--safe);margin-bottom:16px;';
    ok.textContent='✓ Çakışma tespit edilmedi — harika seçimler!';root.appendChild(ok);
  }
}

// ════════════════════════════════════════════════════════════
// DISCLAIMER
// ════════════════════════════════════════════════════════════
function showDisclaimer(){
  let m=document.getElementById('modal');if(m){m.remove();return;}
  m=document.createElement('div');m.id='modal';
  m.onclick=e=>{if(e.target===m)m.remove();};
  const box=div('modal-box');
  box.onclick=e=>e.stopPropagation();
  const head=div('card-head');head.style.textAlign='center';head.style.paddingTop='28px';
  head.innerHTML='<div style="font-size:36px;margin-bottom:10px">🌿</div><div class="card-head-title">Yasal Uyarı</div>';
  const body=div('card-body');
  body.innerHTML='<p style="font-size:14px;color:var(--ink-mid);line-height:1.8;margin-bottom:8px">Bu platform <strong style="color:var(--ink)">Dr. Bengi Su Ege</strong> tarafından genel bilgilendirme amacıyla hazırlanmıştır.</p><p style="font-size:13px;color:var(--ink-light);line-height:1.7;margin-bottom:6px">🌿 Tıbbi tavsiye niteliği taşımaz.</p><p style="font-size:13px;color:var(--ink-light);line-height:1.7;margin-bottom:6px">🌾 Konsantrasyon tahminleri INCI sırasına dayalıdır.</p><p style="font-size:13px;color:var(--ink-light);line-height:1.7;margin-bottom:24px">🌸 Bireysel alerji ve hassasiyetler değerlendirilemez.</p>';
  const closeBtn=el('button','btn btn-primary btn-full');closeBtn.textContent='Anladım';closeBtn.onclick=()=>m.remove();
  body.appendChild(closeBtn);
  box.append(head,body);m.appendChild(box);document.body.appendChild(m);
}

// ════════════════════════════════════════════════════════════
// NAV BUILD
// ════════════════════════════════════════════════════════════
function buildNav(){
  // Desktop tabs
  const navTabs=document.getElementById('navTabs');
  navTabs.innerHTML='';
  [['home','Ana'],['analyze','🔬 Analiz'],['compare','⚖ Karşılaştır'],['quiz','✦ Quiz'],['routine','◑ Rutin']].forEach(([id,lb])=>{
    const t=el('button','nav-tab'+(ST.page===id?' active':''));t.textContent=lb;
    t.onclick=()=>go(id);navTabs.appendChild(t);
  });
  // Mobile nav
  const mNav=document.getElementById('mobile-nav');
  mNav.innerHTML='';
  mNav.style.display=window.innerWidth<=680?'flex':'none';
  [['home','🏠','Ana'],['analyze','🔬','Analiz'],['compare','⚖','Karşı'],['quiz','✦','Quiz'],['routine','◑','Rutin']].forEach(([id,ic,lb])=>{
    const t=el('button','mob-tab'+(ST.page===id?' active':''));
    t.innerHTML='<div class="mob-tab-icon">'+ic+'</div><span>'+lb+'</span>';
    t.onclick=()=>go(id);mNav.appendChild(t);
  });
}

// ════════════════════════════════════════════════════════════
// PETALS
// ════════════════════════════════════════════════════════════
function spawnPetals(){
  const bg=document.getElementById('bg');
  const configs=[
    {l:'5%',d:0,s:9},{l:'14%',d:2.2,s:11},{l:'26%',d:.7,s:8.5},
    {l:'38%',d:3.8,s:12},{l:'52%',d:1.4,s:10},{l:'64%',d:2.8,s:9.5},
    {l:'76%',d:4.2,s:13},{l:'88%',d:.4,s:11.5},{l:'94%',d:3,s:8},
  ];
  configs.forEach((p,i)=>{
    const petal=document.createElement('div');
    petal.className='petal';
    const size=5+Math.random()*5;
    Object.assign(petal.style,{
      left:p.l,
      width:size+'px',
      height:(size*1.6)+'px',
      background:'rgba('+(240+Math.random()*15)+','+(165+Math.random()*20)+','+(190+Math.random()*15)+',0.8)',
      animationDuration:p.s+'s',
      animationDelay:p.d+'s',
      transform:'rotate('+(i*43+15)+'deg)',
    });
    bg.appendChild(petal);
  });
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function render(){
  buildNav();
  const main=document.getElementById('main');
  main.innerHTML='';
  if(ST.page==='home') pageHome(main);
  else if(ST.page==='analyze') pageAnalyze(main);
  else if(ST.page==='compare') pageCompare(main);
  else if(ST.page==='quiz') pageQuiz(main);
  else if(ST.page==='routine') pageRoutine(main);
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  const mNav=document.getElementById('mobile-nav');
  if(mNav) mNav.style.display=window.innerWidth<=680?'flex':'none';
});
spawnPetals();
render();

// Load products in background
fetch(GITHUB_PRODUCTS_URL+'?t='+Date.now())
  .then(r=>r.json())
  .then(data=>{if(Array.isArray(data)&&data.length){ST.products=data;render();}})
  .catch(()=>{});
</script>
