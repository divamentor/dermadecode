];

function detectConflicts(items){
  const keys=items.map(i=>i.name.toLowerCase());
  const found=[];
  for(const c of CONFLICTS){
    const hasA=c.a.some(a=>keys.some(k=>k.includes(a)||a.includes(k)));
    const hasB=c.b.some(b=>keys.some(k=>k.includes(b)||b.includes(k)));
    if(hasA&&hasB){
      // find actual ingredient names
      const aNames=items.filter(i=>c.a.some(a=>i.name.toLowerCase().includes(a)||a.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const bNames=items.filter(i=>c.b.some(b=>i.name.toLowerCase().includes(b)||b.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const key=c.title;
      if(!found.find(f=>f.title===key)) found.push({...c,aNames:[...new Set(aNames)],bNames:[...new Set(bNames)]});
    }
  }
  return found;
}

function calcScore(items){
  if(!items||!items.length)return 0;
  const w=items.map(ing=>{
    let s=ing.rating==="unknown"?45:ing.score;
    if(ing.vitaminCTier===3)s=Math.min(s,72);
    const wt=ing.rating==="risky"?1.5:1;
    return{s,wt};
  });
  const tw=w.reduce((a,b)=>a+b.wt,0);
  return Math.round(w.reduce((a,b)=>a+b.s*b.wt,0)/tw);
}

// ── Quiz ───────────────────────────────────────────────────────────────────────
function buildQuiz() {
  if(!S.quizResult) {
    const q = QUIZ[S.quizStep];
    const pct = ((S.quizStep+1)/QUIZ.length*100)+'%';
    return d({maxWidth:'600px',margin:'0 auto'},
      glass(C.lavMid,
        cardHead('✦','Cilt Tipi Quiz','Soru '+(S.quizStep+1)+'/'+QUIZ.length,C.lavFog),
        d({padding:'28px'},
          // Progress
          d({height:'4px',background:C.lavLight,borderRadius:'4px',marginBottom:'24px',overflow:'hidden'},
            d({height:'100%',width:pct,background:`linear-gradient(90deg,${C.lav},${C.sak})`,transition:'width 0.4s ease',borderRadius:'4px'})
          ),
          d({fontSize:'16px',fontWeight:'600',color:C.ink,lineHeight:'1.6',marginBottom:'24px',fontFamily:"'Playfair Display',serif"}, q.q),
          d({display:'flex',flexDirection:'column',gap:'10px'},
            ...q.opts.map((opt,i)=>{
              const b = mk('button',{style:{
                background:'rgba(255,255,255,0.6)',backdropFilter:'blur(10px)',
                border:`1.5px solid ${C.lavMid}30`,borderRadius:'14px',
                padding:'14px 20px',cursor:'pointer',textAlign:'left',
                display:'flex',alignItems:'center',gap:'14px',
                color:C.ink,fontSize:'14px',fontFamily:'inherit',
                transition:'all 0.2s',
              }});
              const letter = s({
                width:'28px',height:'28px',borderRadius:'50%',
                background:`linear-gradient(135deg,${C.lav},${C.sak})`,
                color:'#fff',fontSize:'12px',fontWeight:'700',flexShrink:'0',
                display:'flex',alignItems:'center',justifyContent:'center',
              }, String.fromCharCode(65+i));
              b.append(letter, mk('span',{},opt.l));
              b.addEventListener('mouseenter',()=>{b.style.background=C.lavFog;b.style.borderColor=C.lav+'60';b.style.transform='translateX(4px)';});
              b.addEventListener('mouseleave',()=>{b.style.background='rgba(255,255,255,0.6)';b.style.borderColor=C.lavMid+'30';b.style.transform='';});
              b.onclick=()=>{
                const ans=[...S.quizAnswers,opt.t];
                if(S.quizStep<QUIZ.length-1) set({quizAnswers:ans,quizStep:S.quizStep+1});
                else{const counts={};ans.forEach(t=>{counts[t]=(counts[t]||0)+1;});set({quizResult:Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]});}
              };
              return b;
            })
          )
        )
      )
    );
  }
  // Result
  const r = SKIN_REC[S.quizResult]||SKIN_REC.normal;
  return d({maxWidth:'600px',margin:'0 auto'},
    glass(C.sakMid,
      cardHead(r.emoji,'Cilt Tipiniz',r.label,C.sakFog),
      d({padding:'28px'},
        p({fontSize:'15px',color:C.inkMid,lineHeight:'1.7',marginBottom:'24px'}, r.desc),
        d({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'28px'},
          d({background:C.mossLight,borderRadius:'16px',padding:'20px',border:`1px solid ${C.moss}30`},
            d({fontSize:'12px',fontWeight:'700',color:C.moss,letterSpacing:'0.06em',marginBottom:'12px'},'✓ ÖNERİLEN'),
            d({display:'flex',flexWrap:'wrap',gap:'6px'}, ...r.badges.map(b=>s({fontSize:'12px',padding:'4px 10px',background:'rgba(255,255,255,0.8)',borderRadius:'100px',color:C.moss,border:`1px solid ${C.moss}30`},b)))
          ),
          d({background:C.riskyLight,borderRadius:'16px',padding:'20px',border:`1px solid ${C.risky}20`},
            d({fontSize:'12px',fontWeight:'700',color:C.risky,letterSpacing:'0.06em',marginBottom:'12px'},'✗ KAÇIN'),
            d({display:'flex',flexWrap:'wrap',gap:'6px'}, ...r.avoid.map(b=>s({fontSize:'12px',padding:'4px 10px',background:'rgba(255,255,255,0.8)',borderRadius:'100px',color:C.risky,border:`1px solid ${C.risky}20`},b)))
          )
        ),
        d({display:'flex',gap:'12px'},
          btn('Tekrar ✦',()=>set({quizStep:0,quizAnswers:[],quizResult:null}),{ghost:true,color:C.lav}),
          btn('Ürün Analiz Et →',()=>set({mode:'analyze'}),{color:C.lav})
        )
      )
    )
  );
}

// ── Analyze ────────────────────────────────────────────────────────────────────
function buildAnalyze() {
  const wrap = d({});

  // Input section
  const card = glass(C.lavMid);
  card.appendChild(cardHead('🔬','İçerik Analizi','INCI listesi veya ürün ara',C.lavFog));
  const inner = d({padding:'28px'});

  const ps = prodSearch(S.productQ, q=>set({productQ:q}), S.productSuggs, ss=>set({productSuggs:ss}),
    p=>{set({input:p.ingredients,productQ:p.name,productSuggs:[]});
        const r=parseIngredients(p.ingredients);set({results:r,activeIdx:null,filter:'all'});});
  inner.appendChild(ps);
  inner.appendChild(d({display:'flex',alignItems:'center',gap:'16px',margin:'20px 0'},
    d({flex:'1',height:'1px',background:`linear-gradient(90deg,transparent,${C.lavMid}40,transparent)`}),
    s({fontSize:'12px',color:C.inkLight,letterSpacing:'0.08em'},'VEYA INCI LİSTESİ'),
    d({flex:'1',height:'1px',background:`linear-gradient(90deg,transparent,${C.lavMid}40,transparent)`}),
  ));
  const ta = inp('Water, Glycerin, Niacinamide…',S.input,v=>set({input:v}),5);
  inner.appendChild(ta);
  inner.appendChild(d({display:'flex',gap:'10px',marginTop:'16px',justifyContent:'space-between',alignItems:'center'},
    btn('Örnek formül', ()=>set({input:SAMPLE}), {ghost:true,color:C.lav,small:true}),
    btn('Analiz Et →', ()=>{const t=S.input;if(!t.trim())return;const r=parseIngredients(t);set({results:r,activeIdx:null,filter:'all'});}, {color:C.lav, disabled:!S.input.trim()})
  ));
  card.appendChild(inner);
  wrap.appendChild(card);

  if(!S.results) return wrap;

  const results=S.results, conflicts=detectConflicts(results);
  const avgScore=calcScore(results);
  const scoreColor=avgScore>=80?C.moss:avgScore>=60?C.gold:C.risky;
  const filtered=results.filter(r=>S.filter==='all'||r.rating===S.filter);
  const active=S.activeIdx!=null?results[S.activeIdx]:null;
  const BADGES=[
    {id:'cer',ic:'🛡',lb:'Bariyer',chk:it=>it.filter(i=>i.name.toLowerCase().includes('ceramide')).length>=3},
    {id:'frf',ic:'🌿',lb:'Parfümsüz',chk:it=>!it.some(i=>['fragrance','parfum','linalool','limonene'].some(k=>i.name.toLowerCase().includes(k)))},
    {id:'vc',ic:'⚡',lb:'Güçlü C',chk:it=>it.some(i=>i.vitaminCTier&&i.vitaminCTier<=2)},
    {id:'ret',ic:'✦',lb:'Retinoid',chk:it=>it.some(i=>['retinol','retinal'].some(k=>i.name.toLowerCase().includes(k)))},
    {id:'cln',ic:'✓',lb:'Temiz',chk:it=>it.filter(i=>i.rating==='risky').length===0},
    {id:'hyd',ic:'💧',lb:'Nem',chk:it=>it.filter((i,idx)=>idx<it.length*0.4&&['glycerin','hyaluronate','panthenol'].some(k=>i.name.toLowerCase().includes(k))).length>=3},
    {id:'spf',ic:'☀',lb:'SPF',chk:it=>it.some(i=>['zinc oxide','titanium dioxide','avobenzone','homosalate'].some(k=>i.name.toLowerCase().includes(k)))},
  ];
  const badges=BADGES.filter(b=>b.chk(results));

  wrap.appendChild(d({height:'16px'}));

  // Score + badges row
  const topRow=d({display:'grid',gridTemplateColumns:'200px 1fr',gap:'16px',marginBottom:'16px'});
  // Score card
  const scoreCard=glass(scoreColor+'80');
  scoreCard.appendChild(d({padding:'24px',textAlign:'center'},
    d({fontSize:'11px',fontWeight:'700',letterSpacing:'0.1em',color:C.inkLight,marginBottom:'8px'},'FORMÜL SKORU'),
    d({fontFamily:"'Playfair Display',serif",fontSize:'56px',fontWeight:'800',color:scoreColor,lineHeight:'1'},String(avgScore)),
    d({fontSize:'12px',color:C.inkLight,marginBottom:'16px'},'/100'),
    d({height:'6px',background:C.lavLight,borderRadius:'100px',overflow:'hidden'},
      d({height:'100%',width:avgScore+'%',background:`linear-gradient(90deg,${scoreColor},${scoreColor}aa)`,borderRadius:'100px',transition:'width 1s ease'})
    )
  ));
  topRow.appendChild(scoreCard);
  // Badges + filters
  const rightCol=d({display:'flex',flexDirection:'column',gap:'12px'});
  if(badges.length) rightCol.appendChild(d({display:'flex',flexWrap:'wrap',gap:'8px'},
    ...badges.map(b=>d({
      display:'flex',alignItems:'center',gap:'6px',
      padding:'6px 14px',borderRadius:'100px',
      background:C.goldLight,border:`1.5px solid ${C.gold}40`,
      fontSize:'12px',color:C.gold,fontWeight:'600',
    },b.ic,' ',b.lb))
  ));
  rightCol.appendChild(d({display:'flex',flexWrap:'wrap',gap:'6px'},
    ...[{l:'Tümü',r:'all',c:C.lav},{l:'🌿 Güvenli',r:'safe',c:C.moss},{l:'🌾 Dikkat',r:'caution',c:C.caution},{l:'🥀 Riskli',r:'risky',c:C.risky},{l:'🍄 ?',r:'unknown',c:C.stone}].map(x=>{
      const active=S.filter===x.r;
      const b=mk('button',{style:{padding:'6px 14px',borderRadius:'100px',border:`1.5px solid ${active?x.c:C.lavMid+'40'}`,background:active?x.c+'15':'transparent',color:active?x.c:C.inkMid,fontSize:'12px',fontWeight:active?'600':'400',cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}},x.l+' ('+results.filter(r=>x.r==='all'||r.rating===x.r).length+')');
      b.onclick=()=>set({filter:x.r});
      return b;
    })
  ));
  topRow.appendChild(rightCol);
  wrap.appendChild(topRow);

  // Conflicts
  if(conflicts.length) {
    const cc=glass(C.risky+'60');
    cc.appendChild(cardHead('⚡',conflicts.length+' Çakışma Tespit Edildi','Dikkat edilmesi gerekenler',C.riskyLight));
    const inner=d({padding:'20px',display:'flex',flexDirection:'column',gap:'12px'});
    conflicts.forEach(cf=>{
      inner.appendChild(d({
        padding:'14px 18px',borderRadius:'14px',
        background:cf.severity==='high'?C.riskyLight:C.cautionLight,
        border:`1px solid ${cf.severity==='high'?C.risky:C.caution}20`,
      },
        d({display:'flex',gap:'10px',alignItems:'flex-start'},
          s({fontSize:'20px'},cf.icon),
          d({},
            d({fontSize:'13px',fontWeight:'700',color:cf.severity==='high'?C.risky:C.caution,marginBottom:'4px'},cf.title),
            d({fontSize:'13px',color:C.inkMid,lineHeight:'1.6'},cf.tip)
          )
        )
      ));
    });
    cc.appendChild(inner);
    wrap.appendChild(d({height:'16px'}));
    wrap.appendChild(cc);
  }

  wrap.appendChild(d({height:'16px'}));

  // Ingredient list
  const listCard=glass(C.lavMid);
  listCard.appendChild(cardHead('📋','Bileşen Listesi',filtered.length+' bileşen',C.lavFog));
  const listInner=d({});
  filtered.forEach((ing,i)=>{
    const meta=RATING[ing.rating]||RATING.unknown;
    const realIdx=results.indexOf(ing);
    const isActive=S.activeIdx===realIdx;
    const hasCf=conflicts.some(cf=>[...(cf.aNames||[]),...(cf.bNames||[])].includes(ing.tr));
    const row=d({
      display:'grid',gridTemplateColumns:'32px 1fr auto auto',
      alignItems:'center',gap:'12px',
      padding:'14px 24px',
      borderBottom:i<filtered.length-1?`1px solid ${C.lavLight}60`:'none',
      background:isActive?`linear-gradient(90deg,${C.lavFog},transparent)`:'transparent',
      cursor:'pointer',transition:'background 0.2s',
    },
      d({width:'28px',height:'28px',borderRadius:'50%',background:meta.bg,border:`1px solid ${meta.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:'0'},meta.emoji),
      d({},
        d({display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'},
          s({fontSize:'14px',color:C.ink,fontWeight:'500'},ing.tr),
          hasCf?s({fontSize:'10px',padding:'2px 8px',background:C.riskyLight,color:C.risky,borderRadius:'100px',border:`1px solid ${C.risky}20`},'⚡ çakışma'):null,
          ing.vitaminCTier===1?s({fontSize:'10px',padding:'2px 8px',background:C.mossLight,color:C.moss,borderRadius:'100px'},'★ C-1'):null,
        ),
        d({fontSize:'11px',color:C.inkLight,marginTop:'2px'},ing.name+' · '+ing.cat+' · #'+ing.listIndex)
      ),
      s({fontSize:'11px',color:C.inkLight,whiteSpace:'nowrap'},ing.position),
      d({textAlign:'right'},
        d({fontSize:'16px',fontWeight:'700',color:meta.text},String(ing.score)),
        d({fontSize:'10px',color:C.inkLight},'/100')
      )
    );
    row.addEventListener('mouseenter',()=>{if(!isActive)row.style.background=C.lavFog;});
    row.addEventListener('mouseleave',()=>{if(!isActive)row.style.background='transparent';});
    row.onclick=()=>set({activeIdx:isActive?null:realIdx});
    listInner.appendChild(row);
  });
  listCard.appendChild(listInner);
  wrap.appendChild(listCard);

  // Detail panel
  if(active) {
    const meta=RATING[active.rating]||RATING.unknown;
    wrap.appendChild(d({height:'16px'}));
    const det=glass(meta.text+'60');
    det.appendChild(cardHead(meta.emoji,active.tr,'Bileşen Detayı',meta.bg));
    const di=d({padding:'24px'});
    di.appendChild(p({fontSize:'14px',color:C.inkMid,lineHeight:'1.8',marginBottom:'16px'},active.desc));
    if(active.vitaminCTier) {
      di.appendChild(d({background:active.vitaminCTier<=2?C.mossLight:active.vitaminCTier===3?C.cautionLight:C.riskyLight,borderRadius:'14px',padding:'16px',marginBottom:'14px',border:`1px solid ${active.vitaminCTier<=2?C.moss:active.vitaminCTier===3?C.caution:C.risky}20`},
        d({fontSize:'12px',fontWeight:'700',color:active.vitaminCTier<=2?C.moss:active.vitaminCTier===3?C.caution:C.risky,marginBottom:'10px'},'C VİTAMİNİ TİER '+active.vitaminCTier+'/4'),
        d({display:'flex',gap:'4px',marginBottom:'8px'},...[1,2,3,4].map(t=>d({flex:'1',height:'6px',borderRadius:'100px',background:t<=active.vitaminCTier?(active.vitaminCTier<=2?C.moss:active.vitaminCTier===3?C.caution:C.risky):C.lavLight,opacity:t<=active.vitaminCTier?'1':'0.3'}))),
        d({fontSize:'13px',color:C.ink},active.vitaminCTier===1?'En güçlü form — direkt aktif, yüksek biyoyararlanım':active.vitaminCTier===2?'İyi form — güvenilir dönüşüm ve etki':active.vitaminCTier===3?'Orta form — dönüşüm gerektirir, değişken biyoyararlanım':'Zayıf form — düşük biyoyararlanım')
      ));
    }
    if(active.usage) di.appendChild(d({background:C.lavFog,borderRadius:'14px',padding:'14px',marginBottom:'12px',border:`1px solid ${C.lavMid}30`,fontSize:'13px',color:C.ink,lineHeight:'1.6'},
      s({fontWeight:'700',color:C.lavDeep},'Kullanım: '),active.usage));
    di.appendChild(d({fontSize:'12px',color:C.inkLight,marginBottom:active.concern?'12px':'0'},'📍 '+active.positionNote));
    if(active.concern) di.appendChild(d({background:C.riskyLight,borderRadius:'12px',padding:'12px 16px',border:`1px solid ${C.risky}20`,fontSize:'13px',color:C.risky,marginTop:'12px'},'⚠️ '+active.concern));
    det.appendChild(di);
    wrap.appendChild(det);
  }

  // Skin suitability
  wrap.appendChild(d({height:'16px'}));
  const skinCard=glass(C.sakMid);
  skinCard.appendChild(cardHead('🌸','Cilt Tipine Uygunluk','5 cilt tipi için formül değerlendirmesi',C.sakFog));
  const skinGrid=d({padding:'24px',display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'16px'});
  ['dry','oily','combination','sensitive','normal'].forEach(type=>{
    const LABS={dry:'Kuru',oily:'Yağlı',combination:'Karma',sensitive:'Hassas',normal:'Normal'};
    const EMJS={dry:'🏜️',oily:'✨',combination:'⚖',sensitive:'🌸',normal:'🍃'};
    const av=results.filter(r=>r.avoid?.includes(type)).length;
    const sc=Math.max(0,Math.round(100-(av/results.length)*100));
    const col=sc>=80?C.moss:sc>=55?C.gold:C.risky;
    skinGrid.appendChild(d({textAlign:'center'},
      d({fontSize:'24px',marginBottom:'8px'},EMJS[type]),
      d({fontFamily:"'Playfair Display',serif",fontSize:'24px',fontWeight:'700',color:col,marginBottom:'6px'},String(sc)),
      d({height:'4px',background:C.lavLight,borderRadius:'100px',marginBottom:'8px',overflow:'hidden'},
        d({height:'100%',width:sc+'%',background:`linear-gradient(90deg,${col},${col}aa)`,borderRadius:'100px',transition:'width 1s ease'})
      ),
      d({fontSize:'11px',color:C.inkLight,fontWeight:'500',letterSpacing:'0.04em'},LABS[type])
    ));
  });
  skinCard.appendChild(skinGrid);
  wrap.appendChild(skinCard);

  // Promise analysis
  wrap.appendChild(d({height:'16px'}));
  const promCard=glass(C.gold+'80');
  promCard.appendChild(cardHead('🌾','Vaatler vs Formül','Ürünün ne söylediği ile ne içerdiği',C.goldLight));
  const promGrid=d({padding:'20px',display:'flex',flexDirection:'column',gap:'10px'});
  [
    {c:'💧 Nemlendirme',e:()=>{const a=results.filter(i=>['hyaluronic','sodium hyaluronate','glycerin','panthenol','urea'].some(k=>i.name.toLowerCase().includes(k)));if(!a.length)return{v:'Zayıf',c:C.risky,d:'Güçlü nemlendirici bileşen bulunamadı.'};const pp=results.indexOf(a[0])/results.length;return pp<0.4?{v:'Güçlü',c:C.moss,d:a[0].tr+' üst sıralarda, etkin konsantrasyon.'}:pp<0.7?{v:'Orta',c:C.gold,d:a[0].tr+' orta sıralarda.'}:{v:'Zayıf',c:C.risky,d:a[0].tr+' formülün sonlarında.'}}},
    {c:'⏳ Anti-Aging',e:()=>{const a=results.filter(i=>['retinol','retinal','bakuchiol','adenosine','peptide','ascorbic acid'].some(k=>i.name.toLowerCase().includes(k)));if(!a.length)return{v:'Yok',c:C.stone,d:'Anti-aging bileşen bulunamadı.'};return results.indexOf(a[0])<results.length*0.5?{v:'Güçlü',c:C.moss,d:a[0].tr+' etkin sırada.'}:{v:'Orta',c:C.gold,d:a[0].tr+' mevcut.'}}},
    {c:'✨ Leke Açma',e:()=>{const a=results.filter(i=>['niacinamide','alpha arbutin','ascorbic acid','ascorbyl','azelaic','tranexamic'].some(k=>i.name.toLowerCase().includes(k)));if(!a.length)return{v:'Yok',c:C.stone,d:'Leke önleyici bileşen bulunamadı.'};return results.indexOf(a[0])<results.length*0.5?{v:'Güçlü',c:C.moss,d:a[0].tr+' etkin.'}:{v:'Orta',c:C.gold,d:a[0].tr+' mevcut.'}}},
    {c:'🌸 Hassas Cilt',e:()=>{const so=results.filter(i=>['allantoin','centella','aloe','panthenol','ceramide','squalane'].some(k=>i.name.toLowerCase().includes(k)));const ir=results.filter(i=>['fragrance','parfum','alcohol denat'].some(k=>i.name.toLowerCase().includes(k)));if(ir.length&&!so.length)return{v:'Riskli',c:C.risky,d:ir[0].tr+' irritan var.'};if(ir.length)return{v:'Çelişkili',c:C.caution,d:'Hem irritan hem yatıştırıcı var.'};return so.length>=2?{v:'Uygun',c:C.moss,d:'Yatıştırıcı formül.'}:so.length?{v:'Orta',c:C.gold,d:'Kısmi yatıştırıcı.'}:{v:'Nötr',c:C.stone,d:'Yatıştırıcı bileşen yok.'}}},
    {c:'🛡 Bariyer',e:()=>{const c=results.filter(i=>i.name.toLowerCase().includes('ceramide'));return c.length>=2?{v:'Güçlü',c:C.moss,d:c.length+' seramid kompleksi.'}:c.length?{v:'İyi',c:C.moss,d:c[0].tr+' mevcut.'}:{v:'Zayıf',c:C.risky,d:'Seramid kompleksi yok.'}}},
    {c:'☀ SPF',e:()=>{const sf=results.filter(i=>['zinc oxide','titanium dioxide','avobenzone','homosalate'].some(k=>i.name.toLowerCase().includes(k)));if(!sf.length)return{v:'Yok',c:C.stone,d:'Güneş filtresi yok.'};return sf.some(a=>['zinc oxide','titanium dioxide'].some(k=>a.name.toLowerCase().includes(k)))?{v:'Fiziksel',c:C.moss,d:'Güvenli mineral filtre.'}:{v:'Kimyasal',c:C.gold,d:'Kimyasal UV filtresi.'}}},
  ].forEach(check=>{
    const r=check.e();
    promGrid.appendChild(d({
      display:'flex',alignItems:'center',justifyContent:'space-between',gap:'16px',
      padding:'14px 20px',borderRadius:'14px',
      background:'rgba(255,255,255,0.5)',border:`1px solid ${C.lavMid}20`,
    },
      d({},
        d({fontSize:'13px',fontWeight:'600',color:C.ink,marginBottom:'3px'},check.c),
        d({fontSize:'12px',color:C.inkLight,lineHeight:'1.5'},r.d)
      ),
      s({fontSize:'12px',padding:'5px 14px',borderRadius:'100px',background:r.c+'15',color:r.c,fontWeight:'700',border:`1px solid ${r.c}30`,whiteSpace:'nowrap'},r.v)
    ));
  });
  promCard.appendChild(promGrid);
  promCard.appendChild(d({padding:'14px 24px',borderTop:`1px solid ${C.lavLight}60`,fontSize:'11px',color:C.inkLight},'⚠️ Konsantrasyon bilinmeden kesin etkinlik garantisi verilemez. Genel bilgi amaçlıdır.'));
  wrap.appendChild(promCard);
  return wrap;
}

// ── Compare ────────────────────────────────────────────────────────────────────
function buildCompare() {
  const wrap=d({});
  const mainCard=glass(C.lav+'60');
  mainCard.appendChild(cardHead('⚖','Ürün Karşılaştırma','İki ürünü yan yana değerlendir',C.lavFog));
  const grid=d({padding:'24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'});
  ['A','B'].forEach(label=>{
    const st=label==='A'?S.cmpA:S.cmpB;
    const setSt=patch=>set({[label==='A'?'cmpA':'cmpB']:{...(label==='A'?S.cmpA:S.cmpB),...patch}});
    const col=d({});
    col.appendChild(d({fontSize:'13px',fontWeight:'700',color:C.lav,letterSpacing:'0.06em',marginBottom:'12px'},'ÜRÜN '+label));
    col.appendChild(prodSearch(st.productQ,q=>setSt({productQ:q}),st.productSuggs,ss=>setSt({productSuggs:ss}),p=>{const r=parseIngredients(p.ingredients);setSt({input:p.ingredients,results:r,productQ:p.name,productSuggs:[]});},true));
    col.appendChild(d({height:'12px'}));
    const ta=inp('veya INCI listesi yapıştır…',st.input,v=>setSt({input:v}),4);
    col.appendChild(ta);
    col.appendChild(d({height:'10px'}));
    col.appendChild(btn('Analiz Et →',()=>{const r=parseIngredients(st.input);setSt({results:r});},{color:C.lav,disabled:!st.input.trim(),full:true}));
    grid.appendChild(col);
  });
  mainCard.appendChild(grid);
  wrap.appendChild(mainCard);

  const A=S.cmpA.results,B=S.cmpB.results;
  if(!A||!B) return wrap;

  wrap.appendChild(d({height:'16px'}));
  const sA=calcScore(A),sB=calcScore(B),w=sA>sB?'A':sB>sA?'B':null;
  const resRow=d({display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'16px',alignItems:'center',marginBottom:'16px'});

  [[A,'A',S.cmpA],[B,'B',S.cmpB]].forEach(([res,label,st])=>{
    const sc=calcScore(res),sC=sc>=80?C.moss:sc>=60?C.gold:C.risky;
    const c=glass(sC+'60');
    c.appendChild(d({padding:'20px'},
      d({fontSize:'13px',fontWeight:'700',color:C.inkLight,marginBottom:'4px'},label==='A'?'◀ ÜRÜN A':'ÜRÜN B ▶'),
      d({fontSize:'11px',color:C.inkLight,marginBottom:'12px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},st.productQ||'Manuel giriş'),
      d({fontFamily:"'Playfair Display',serif",fontSize:'48px',fontWeight:'800',color:sC,lineHeight:'1'},String(sc)),
      d({fontSize:'12px',color:C.inkLight,marginBottom:'10px'},'/100'),
      d({height:'4px',background:C.lavLight,borderRadius:'100px',overflow:'hidden'},d({height:'100%',width:sc+'%',background:`linear-gradient(90deg,${sC},${sC}aa)`,borderRadius:'100px'}))
    ));
    if(label==='A') resRow.appendChild(c);
    else resRow.appendChild(c);
  });
  // Winner badge
  resRow.insertBefore(d({textAlign:'center'},
    d({fontSize:'40px',marginBottom:'8px'},w?'🏆':'⚖'),
    d({fontSize:'14px',fontWeight:'700',color:w?C.gold:C.inkMid,marginBottom:'4px'},w?'Ürün '+w+' Kazanıyor':'Eşit!'),
    w?d({fontSize:'12px',color:C.inkLight},'Fark: '+Math.abs(sA-sB)+' puan'):null
  ), resRow.children[1]);
  wrap.appendChild(resRow);

  // Ingredient diff
  const diffCard=glass(C.lavMid);
  diffCard.appendChild(cardHead('🔍','Bileşen Farkı','Ortak ve ayrı bileşenler',C.lavFog));
  const kA=new Set(A.map(i=>i.tr)),kB=new Set(B.map(i=>i.tr));
  const oA=[...kA].filter(k=>!kB.has(k)).slice(0,8),oB=[...kB].filter(k=>!kA.has(k)).slice(0,8),cm=[...kA].filter(k=>kB.has(k)).slice(0,8);
  diffCard.appendChild(d({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',padding:'20px',gap:'20px'},
    ...[[oA,"Sadece A'da",C.lav],[cm,'Ortak',C.gold],[oB,'Sadece B',C.sak]].map(([list,title,col])=>d({},
      d({fontSize:'12px',fontWeight:'700',color:col,letterSpacing:'0.06em',marginBottom:'12px'},title),
      ...(!list.length?[d({fontSize:'12px',color:C.inkLight},'—')]:list.map(k=>d({fontSize:'13px',color:C.ink,padding:'6px 0',borderBottom:`1px solid ${C.lavLight}60`},k)))
    ))
  ));
  wrap.appendChild(diffCard);
  return wrap;
}

// ── Routine ────────────────────────────────────────────────────────────────────
function buildRoutineUI() {
  const wrap=d({});
  const mainCard=glass(C.gold+'60');
  mainCard.appendChild(cardHead('◑','Rutin Oluşturucu','Ürünlerini ekle, sıralama ve uyarıları al',C.goldLight));
  const inner=d({padding:'24px'});
  inner.appendChild(prodSearch(S.routineQ,q=>set({routineQ:q}),S.routineSuggs,ss=>set({routineSuggs:ss}),
    p=>{if(S.routineProds.find(rp=>rp.name===p.name))return;
      set({routineProds:[...S.routineProds,{name:p.name,brand:p.brand,cat:p.cat||'',ingredients:p.ingredients,parsed:parseIngredients(p.ingredients)}],routineQ:'',routineSuggs:[],routineResult:null});},
  false));
  inner.appendChild(d({height:'16px'}));
  inner.appendChild(d({fontSize:'12px',color:C.inkLight,letterSpacing:'0.06em',marginBottom:'10px'},'VEYA MANUEL EKLE'));
  const mRow=d({display:'grid',gridTemplateColumns:'1fr 2fr auto',gap:'10px',alignItems:'center'});
  const nameI=inp('Ürün adı',S.manualName,v=>{S.manualName=v;});
  const ingI=inp('Water, Glycerin, Niacinamide…',S.manualIng,v=>{S.manualIng=v;});
  const addB=btn('+ Ekle',()=>{
    const n=nameI.value.trim(),i=ingI.value.trim();
    if(!n||!i)return;
    set({routineProds:[...S.routineProds,{name:n,brand:'',cat:'',ingredients:i,parsed:parseIngredients(i)}],manualName:'',manualIng:'',routineResult:null});
  },{color:C.gold,small:true});
  mRow.append(nameI,ingI,addB);
  inner.appendChild(mRow);
  mainCard.appendChild(inner);
  wrap.appendChild(mainCard);

  if(S.routineProds.length) {
    wrap.appendChild(d({height:'16px'}));
    const listC=glass(C.lavMid);
    listC.appendChild(cardHead('🛍','Eklenen Ürünler ('+S.routineProds.length+')',null,C.lavFog));
    S.routineProds.forEach((p,i)=>{
      const row=d({display:'flex',alignItems:'center',gap:'14px',padding:'14px 24px',borderBottom:i<S.routineProds.length-1?`1px solid ${C.lavLight}60`:'none'},
        s({fontSize:'20px'},gTime(p)==='am'?'🌅':gTime(p)==='pm'?'🌙':'🌿'),
        d({flex:'1'},
          d({fontSize:'14px',color:C.ink,fontWeight:'500'},p.name),
          p.brand?d({fontSize:'12px',color:C.lav,marginTop:'2px'},p.brand):null
        ),
        mk('button',{style:{background:C.riskyLight,border:`1px solid ${C.risky}20`,borderRadius:'50%',width:'28px',height:'28px',cursor:'pointer',color:C.risky,fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'},onclick:()=>set({routineProds:S.routineProds.filter((_,j)=>j!==i),routineResult:null})},'×')
      );
      listC.appendChild(row);
    });
    listC.appendChild(d({padding:'16px 24px',borderTop:`1px solid ${C.lavLight}60`},
      btn('🌿 Rutini Oluştur →',doBuildRoutine,{color:C.gold,full:true})
    ));
    wrap.appendChild(listC);
  }

  if(S.routineResult) {
    wrap.appendChild(d({height:'16px'}));
    const rr=S.routineResult;
    if(rr.warns.length) {
      const wc=glass(C.risky+'60');
      wc.appendChild(cardHead('⚡','Uyarılar','Rutin çakışmaları',C.riskyLight));
      const wi=d({padding:'16px 24px',display:'flex',flexDirection:'column',gap:'10px'});
      rr.warns.forEach(w=>wi.appendChild(d({padding:'12px 16px',borderRadius:'12px',background:w.sev==='high'?C.riskyLight:C.cautionLight,border:`1px solid ${w.sev==='high'?C.risky:C.caution}20`},
        d({fontSize:'12px',fontWeight:'700',color:w.sev==='high'?C.risky:C.caution,marginBottom:'4px'},w.sev==='high'?'⚡ Yüksek Risk':'⚠ Orta Risk'),
        d({fontSize:'13px',color:C.inkMid,lineHeight:'1.6'},w.msg)
      )));
      wc.appendChild(wi);
      wrap.appendChild(wc);
      wrap.appendChild(d({height:'16px'}));
    }
    d({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'});
    const rGrid=d({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'});
    [{lb:'🌅 Sabah Rutini',list:rr.am,col:C.gold,dim:C.goldLight},{lb:'🌙 Akşam Rutini',list:rr.pm,col:C.lav,dim:C.lavFog}].forEach(({lb,list,col,dim})=>{
      const c=glass(col+'60');
      c.appendChild(d({padding:'16px 24px',background:dim,borderBottom:`1px solid ${col}20`,fontSize:'13px',fontWeight:'700',color:col},lb));
      if(!list.length) c.appendChild(d({padding:'20px 24px',fontSize:'13px',color:C.inkLight,textAlign:'center'},'Bu seans için ürün yok.'));
      list.forEach((p,i)=>{
        const row=d({padding:'14px 24px',borderBottom:i<list.length-1?`1px solid ${C.lavLight}60`:'none'});
        row.appendChild(d({fontSize:'11px',fontWeight:'700',color:col,letterSpacing:'0.05em',marginBottom:'4px'},(i+1)+'. '+p.step));
        row.appendChild(d({fontSize:'14px',color:C.ink,fontWeight:'500'},p.name));
        if(p.brand) row.appendChild(d({fontSize:'12px',color:C.inkLight,marginTop:'2px'},p.brand));
        const tags=d({display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'});
        if(p.act.ret) tags.appendChild(s({fontSize:'11px',padding:'3px 10px',borderRadius:'100px',background:C.lavLight,color:C.lavDeep},'Retinoid'));
        if(p.act.aha||p.act.bha) tags.appendChild(s({fontSize:'11px',padding:'3px 10px',borderRadius:'100px',background:C.cautionLight,color:C.caution},'Asit'));
        if(p.act.vitC) tags.appendChild(s({fontSize:'11px',padding:'3px 10px',borderRadius:'100px',background:C.mossLight,color:C.moss},'C Vit.'));
        if(tags.children.length) row.appendChild(tags);
        c.appendChild(row);
      });
      rGrid.appendChild(c);
    });
    wrap.appendChild(rGrid);
    if(rr.tips.length) {
      const tc=glass(C.moss+'60');
      tc.appendChild(cardHead('💡','Uzman İpuçları',null,C.mossLight));
      const ti=d({padding:'20px 24px',display:'flex',flexDirection:'column',gap:'10px'});
      rr.tips.forEach(t=>ti.appendChild(d({fontSize:'13px',color:C.ink,lineHeight:'1.7',padding:'10px 16px',borderRadius:'12px',background:C.mossLight,border:`1px solid ${C.moss}20`,borderLeft:`4px solid ${C.moss}`},t)));
      tc.appendChild(ti);wrap.appendChild(tc);
    }
    if(!rr.warns.length) wrap.appendChild(d({padding:'14px 20px',borderRadius:'14px',background:C.mossLight,border:`1px solid ${C.moss}20`,fontSize:'14px',color:C.moss,fontWeight:'600'},'✓ Rutin çakışmasız — harika seçimler!'));
  }
  return wrap;
}

// ── Disclaimer ─────────────────────────────────────────────────────────────────
function showDisclaimer() {
  let m=document.getElementById('modal');
  if(m){m.remove();return;}
  m=mk('div',{id:'modal',style:{position:'fixed',inset:'0',background:'rgba(45,31,61,0.6)',backdropFilter:'blur(8px)',zIndex:'100',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}});
  m.onclick=e=>{if(e.target===m)m.remove();};
  const box=d({background:'rgba(247,244,249,0.95)',backdropFilter:'blur(20px)',maxWidth:'460px',width:'100%',borderRadius:'24px',border:`1.5px solid ${C.lavMid}30`,boxShadow:'0 24px 80px rgba(107,79,138,0.2)',overflow:'hidden'});
  box.appendChild(d({padding:'24px 28px',borderBottom:`1px solid ${C.lavLight}60`,background:`linear-gradient(135deg,${C.lavFog},${C.sakFog})`},
    d({fontSize:'24px',marginBottom:'8px'},'🌿'),
    d({fontFamily:"'Playfair Display',serif",fontSize:'20px',fontWeight:'700',color:C.lavDeep},'Yasal Uyarı')
  ));
  box.appendChild(d({padding:'24px 28px'},
    p({fontSize:'14px',color:C.inkMid,lineHeight:'1.8',marginBottom:'8px'},'Bu platform ',s({fontWeight:'700',color:C.lavDeep},'Dr. Bengi Su Ege'),' tarafından genel bilgilendirme amacıyla hazırlanmıştır.'),
    p({fontSize:'13px',color:C.inkLight,lineHeight:'1.7',marginBottom:'8px'},'🌿 Tıbbi tavsiye niteliği taşımaz.'),
    p({fontSize:'13px',color:C.inkLight,lineHeight:'1.7',marginBottom:'8px'},'🌾 Konsantrasyon tahminleri INCI sırasına dayalıdır.'),
    p({fontSize:'13px',color:C.inkLight,lineHeight:'1.7',marginBottom:'24px'},'🌸 Bireysel alerji ve hassasiyetler değerlendirilemez.'),
    btn('Anladım ✓',()=>m.remove(),{color:C.lav,full:true})
  ));
  box.addEventListener('click',e=>e.stopPropagation());
  m.appendChild(box);
  document.body.appendChild(m);
}

// ── Main render ────────────────────────────────────────────────────────────────
function draw() {
  const root=document.getElementById('root');
  root.innerHTML='';

  const app=d({minHeight:'100vh',background:C.bg,fontFamily:"'Lato',sans-serif",position:'relative',color:C.ink});
  app.appendChild(buildBg());

  // Nav
  app.appendChild(buildNav());

  // Main content
  const main=d({position:'relative',zIndex:'1',maxWidth:'900px',margin:'0 auto',padding:'32px 24px 80px'});

  let page;
  if(S.mode==='home') page=buildHome();
  else if(S.mode==='quiz') page=buildQuiz();
  else if(S.mode==='analyze') page=buildAnalyze();
  else if(S.mode==='compare') page=buildCompare();
  else if(S.mode==='routine') page=buildRoutineUI();
  if(page) main.appendChild(page);
  app.appendChild(main);

  // Footer disclaimer
  app.appendChild(d({position:'relative',zIndex:'1',textAlign:'center',padding:'24px',borderTop:`1px solid ${C.lavLight}60`},
    mk('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:'12px',color:C.inkLight,fontFamily:'inherit'},onclick:showDisclaimer},'⚠️ Yasal Uyarılar & Dr. Bengi Su Ege')
  ));

  root.appendChild(app);
}

// ── Bootstrap ──────────────────────────────────────────────────────────────────
// Fetch products from GitHub
fetch(GITHUB_PRODUCTS_URL+'?t='+Date.now())
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(data=>{
    if(Array.isArray(data)&&data.length>0) {
      S.allProducts=data;
      S.loading=false;
      console.log('Loaded '+data.length+' products from GitHub');
    }
  })
  .catch(e=>{console.warn('Products fetch failed:',e.message);S.loading=false;})
  .finally(()=>draw());

// Initial render (loading state)
draw();
} // end
