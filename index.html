// ─── HELPERS ─────────────────────────────────────────────────────────────────
function lookupIngredient(raw, index, total) {
  const key = raw.trim().toLowerCase().replace(/\*/g,"");
  let found = DB[key];
  if (!found) { for (const [k,v] of Object.entries(DB)) { if (key.includes(k)||k.includes(key)){found=v;break;} } }
  const base = found||{tr:raw.trim(),cat:"Bilinmeyen",rating:"unknown",score:50,desc:"Veritabanında bilgi yok.",concern:null,comedogenic:0,skinTypes:["all"],usage:"Bilgi yok.",avoid:[]};
  const pct=index/total;
  const position=pct<0.15?"Yüksek":pct<0.4?"Orta-Yüksek":pct<0.65?"Orta":pct<0.85?"Düşük":"Eser";
  const positionNote=pct<0.15?"Üst sıralarda — yüksek konsantrasyon":pct<0.4?"İlk yarıda — orta-yüksek":pct<0.65?"Ortada — orta":pct<0.85?"İkinci yarıda — düşük":"Sonda — genellikle <%1";
  return {name:raw.trim(),position,positionNote,listIndex:index+1,...base};
}
function parseIngredients(text){
  const items=text.split(/[,\n;]+/).map(s=>s.trim()).filter(Boolean);
  return items.map((item,i)=>lookupIngredient(item,i,items.length));
}

  {a:["alcohol denat","alcohol"],b:["retinol","ascorbic acid","niacinamide"],severity:"medium",icon:"🟡",title:"Alkol + Aktif Bileşenler",tip:"Alkol aktif bileşenlerin etkinliğini azaltabilir ve iritasyon artırabilir."},
  {a:["fragrance","parfum"],b:["retinol","retinal","glycolic acid","salicylic acid","ascorbic acid"],severity:"medium",icon:"🟡",title:"Parfüm + Güçlü Aktifler",tip:"Parfüm hassas ve aktif içerikli ürünlerde ekstra iritasyon riski."},
];

function detectConflicts(items){
  const keys=items.map(i=>i.name.toLowerCase());
  const found=[];
  for(const c of CONFLICTS){
    const hasA=c.a.some(a=>keys.some(k=>k.includes(a)||a.includes(k)));
    const hasB=c.b.some(b=>keys.some(k=>k.includes(b)||b.includes(k)));
    if(hasA&&hasB){
      // find actual ingredient names
      const aNames=items.filter(i=>c.a.some(a=>i.name.toLowerCase().includes(a)||a.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const bNames=items.filter(i=>c.b.some(b=>i.name.toLowerCase().includes(b)||b.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const key=c.title;
      if(!found.find(f=>f.title===key)) found.push({...c,aNames:[...new Set(aNames)],bNames:[...new Set(bNames)]});
    }
  }
  return found;
}

function calcScore(items){
  if(!items||!items.length)return 0;
  const w=items.map(ing=>{
    let s=ing.rating==="unknown"?45:ing.score;
    if(ing.vitaminCTier===3)s=Math.min(s,72);
    const wt=ing.rating==="risky"?1.5:1;
    return{s,wt};
  });
  const tw=w.reduce((a,b)=>a+b.wt,0);
  return Math.round(w.reduce((a,b)=>a+b.s*b.wt,0)/tw);
}

      if(p.brand.toLowerCase().includes(ql))s+=40;
      if(p.name.toLowerCase().startsWith(ql))s+=30;
      return{...p,_s:s};
    }).filter(p=>p._s>0).sort((a,b)=>b._s-a._s).slice(0,8);
    cb(scored);
  };

      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:base64}},

      const data=await resp.json();

  const guessTime=(p)=>{const n=(p.name+" "+(p.cat||"")).toLowerCase();if(/spf|sunscreen|güneş|sun protect/.test(n))return"morning";if(/night|gece|retinol|retinal|retinoid|granactive|peeling|exfoliant|aha|bha|glycolic|salicylic/.test(n))return"evening";if(/cleansing oil|oil cleanser|cleansing balm/.test(n))return"evening";return"both";};

  const getActives=(parsed)=>{const k=parsed.map(i=>i.name.toLowerCase());const has=(terms)=>terms.some(t=>k.some(ki=>ki.includes(t)));return{retinoid:has(["retinol","retinal","granactive","hydroxypinacolone retinoate"]),vitaminC:has(["ascorbic acid","sodium ascorbyl phosphate","3-o-ethyl"]),aha:has(["glycolic acid","lactic acid","mandelic acid"]),bha:has(["salicylic acid","betaine salicylate"]),niacinamide:has(["niacinamide"]),benzoyl:has(["benzoyl peroxide"])};};

                      <button key={i} className="btn-px" onClick={()=>answerQuiz(opt.t)}
                        style={{background:P.bgCard,padding:"14px 18px",...px(P.border),border:`3px solid ${P.border}`,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{...pixel,fontSize:9,color:P.pink,flexShrink:0}}>{String.fromCharCode(65+i)}</div>
                        <div style={{fontSize:14,color:P.text}}>{opt.l}</div>
                      </button>
                    ))}
                  </div>
                </div>
              </PixelCard>
            ):(
              <div className="fade">
                {(()=>{const r=SKIN_REC[quizResult]||SKIN_REC.normal;return(
                  <PixelCard color={P.mint}>
                    <SectionHead emoji="🌸" title="CİLT TİPİNİZ" color={P.mintDim}/>
                    <div style={{padding:24,textAlign:"center"}}>
                      <div style={{fontSize:56,marginBottom:8}}>{r.emoji}</div>
                      <div style={{...pixel,fontSize:14,color:P.mint,marginBottom:8}}>{r.label}</div>
                      <div style={{fontSize:14,color:P.textMid,lineHeight:1.8,marginBottom:24}}>{r.desc}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
                        <div style={{background:P.mintDim,padding:16,...px(P.mintBorder,2)}}>
                          <div style={{...pixel,fontSize:8,color:P.mint,marginBottom:10}}>✓ ÖNERİLEN</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                            {r.badges.map(b=><span key={b} style={{fontSize:11,padding:"3px 8px",background:P.bgCard,...px(P.mint,2),color:P.mint}}>{b}</span>)}
                          </div>
                        </div>
                        <div style={{background:P.riskyDim,padding:16,...px(P.riskyBorder,2)}}>
                          <div style={{...pixel,fontSize:8,color:P.risky,marginBottom:10}}>✗ KAÇIN</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                            {r.avoid.map(b=><span key={b} style={{fontSize:11,padding:"3px 8px",background:P.bgCard,...px(P.risky,2),color:P.risky}}>{b}</span>)}
                          </div>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:10}}>
                        <PxBtn onClick={()=>{setQuizStep(0);setQuizAnswers([]);setQuizResult(null);}} color={P.lavender} style={{flex:1,textAlign:"center",display:"block"}}>Tekrar 🎯</PxBtn>
                        <PxBtn onClick={()=>setMode("analyze")} style={{flex:2,textAlign:"center",display:"block"}}>Ürün Analiz Et 🔍</PxBtn>
                      </div>
                    </div>
                  </PixelCard>
                );})()}
              </div>
            )}
          </div>
        )}

        {/* ── ANALYZE ── */}
        {mode==="analyze"&&(
          <div className="fade">
            <PixelCard color={P.pink} style={{marginBottom:12}}>
              <SectionHead emoji="🔍" title="ÜRÜN ANALİZ" color={P.pinkDim}/>
              <div style={{padding:18}}>
                <ProductSearch q={productQ} setQ={setProductQ} suggs={productSuggs} setSuggs={setProductSuggs}
                  onSearch={q=>searchProducts(q,s=>setProductSuggs(s))}
                  onSelect={p=>{setInput(p.ingredients);setProductQ(p.name);setProductSuggs([]);analyze(p.ingredients);}}
                  ghStatus={ghStatus} totalCount={allProducts.length}/>
                <div style={{margin:"12px 0",display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,height:2,background:`repeating-linear-gradient(90deg,${P.border} 0,${P.border} 6px,transparent 6px,transparent 12px)`}}/>
                  <span style={{fontSize:11,color:P.textLight,...pixel}}>ya da</span>
                  <div style={{flex:1,height:2,background:`repeating-linear-gradient(90deg,${P.border} 0,${P.border} 6px,transparent 6px,transparent 12px)`}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:12,color:P.textMid}}>INCI listesini yapıştır</span>
                  <button onClick={()=>setInput(SAMPLE)} style={{...pixel,fontSize:8,padding:"4px 10px",cursor:"pointer",background:P.yellowDim,color:P.peach,border:`2px solid ${P.yellowBorder}`,boxShadow:`2px 2px 0 ${P.yellowBorder}`,fontFamily:"'Press Start 2P',monospace"}}>Örnek</button>
                </div>
                <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder="Water, Glycerin, Niacinamide..." rows={4}
                  style={{width:"100%",background:P.bgDeep,border:`3px solid ${P.border}`,padding:12,color:P.text,fontSize:13,resize:"vertical",lineHeight:1.6,boxShadow:`3px 3px 0 ${P.border}`}}/>
                <PxBtn onClick={()=>analyze()} disabled={!input.trim()} style={{marginTop:10,width:"100%",textAlign:"center",display:"block"}}>
                  ✨ İçerikleri Analiz Et
                </PxBtn>
              </div>
            </PixelCard>

            <div style={{marginBottom:12,padding:"10px 14px",background:P.yellowDim,...px(P.yellowBorder,2),fontSize:12,color:P.peach,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span>🌼 Genel bilgi amaçlıdır, tıbbi tavsiye değildir.</span>
              <button onClick={()=>setShowDisclaimer(true)} style={{...pixel,fontSize:8,color:P.risky,background:"none",border:`2px solid ${P.riskyBorder}`,padding:"3px 8px",cursor:"pointer",fontFamily:"'Press Start 2P',monospace"}}>Uyarılar</button>
            </div>

            {results&&(
              <div className="fade">
                {/* BADGES */}
                {badges.length>0&&(
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                    {badges.map((b,i)=>(
                      <div key={b.id} className="pop" style={{animationDelay:`${i*0.08}s`,display:"flex",alignItems:"center",gap:6,padding:"6px 10px",...px(P.yellowBorder,2),background:P.yellowDim,fontSize:12,color:P.peach}} title={b.desc||""}>
                        {b.icon} <span style={{...pixel,fontSize:8}}>{b.label}</span>
                      </div>
                    ))}
                  </div>
                )}

                {/* CONFLICTS */}
                {conflicts.length>0&&(
                  <PixelCard color={P.risky} style={{marginBottom:12}}>
                    <SectionHead emoji="⚡" title={`${conflicts.length} ÇAKIŞMA TESPİT EDİLDİ`} color={P.riskyDim}/>
                    {conflicts.map((cf,i)=>(
                      <div key={i} style={{padding:"12px 16px",borderBottom:i<conflicts.length-1?`2px dashed ${P.riskyBorder}`:"none"}}>
                        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                          <span style={{fontSize:16}}>{cf.icon}</span>
                          <span style={{...pixel,fontSize:8,color:cf.severity==="high"?P.risky:P.caution}}>{cf.title}</span>
                          <span style={{...pixel,fontSize:7,padding:"2px 6px",background:cf.severity==="high"?P.riskyDim:P.cautionDim,color:cf.severity==="high"?P.risky:P.caution,...px(cf.severity==="high"?P.riskyBorder:P.cautionBorder,1)}}>
                            {cf.severity==="high"?"YÜKSEK":"ORTA"}
                          </span>
                        </div>
                        <div style={{fontSize:12,color:P.textMid,lineHeight:1.7,paddingLeft:24}}>
                          <span style={{color:P.risky}}>{cf.aNames?.join(", ")}</span>{cf.aNames&&" + "}<span style={{color:P.caution}}>{cf.bNames?.join(", ")}</span>
                          <div style={{marginTop:4,color:P.textLight}}>{cf.tip}</div>
                        </div>
                      </div>
                    ))}
                  </PixelCard>
                )}

                {/* SCORES */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <PixelCard color={scoreColor}>
                    <div style={{padding:"18px 20px"}}>
                      <div style={{...pixel,fontSize:8,color:P.textMid,marginBottom:8}}>GENEL SKOR</div>
                      <div style={{...pixel,fontSize:36,color:scoreColor,lineHeight:1,marginBottom:10}}>{avgScore}<span style={{fontSize:14,color:P.textLight}}>/100</span></div>
                      <div style={{height:8,...px(P.border,2)}}>
                        <div style={{height:"100%",width:`${avgScore}%`,background:`repeating-linear-gradient(90deg,${scoreColor} 0,${scoreColor} 8px,${scoreColor}aa 8px,${scoreColor}aa 12px)`,transition:"width 1s ease"}}/>
                      </div>
                    </div>
                  </PixelCard>
                  <PixelCard color={P.lavender}>
                    <div style={{padding:"18px 20px"}}>
                      <div style={{...pixel,fontSize:8,color:P.textMid,marginBottom:12}}>DAĞILIM</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {[{l:"Güvenli",c:results.filter(r=>r.rating==="safe").length,col:P.safe,r:"safe"},{l:"Dikkat",c:results.filter(r=>r.rating==="caution").length,col:P.caution,r:"caution"},{l:"Riskli",c:results.filter(r=>r.rating==="risky").length,col:P.risky,r:"risky"},{l:"?",c:results.filter(r=>r.rating==="unknown").length,col:P.unknown,r:"unknown"}].map(x=>(
                          <button key={x.r} onClick={()=>setFilter(f=>f===x.r?"all":x.r)}
                            style={{display:"flex",alignItems:"center",gap:5,padding:"6px 8px",background:filter===x.r?`${x.col}20`:P.bgDeep,border:`2px solid ${filter===x.r?x.col:P.border}`,cursor:"pointer",boxShadow:filter===x.r?`2px 2px 0 ${x.col}`:"none"}}>
                            <div style={{width:8,height:8,background:x.col,flexShrink:0}}/>
                            <span style={{...pixel,fontSize:8,color:P.text}}>{x.c}</span>
                            <span style={{fontSize:10,color:P.textMid}}>{x.l}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </PixelCard>
                </div>

                {/* INGREDIENT LIST */}
                <PixelCard color={P.border} style={{marginBottom:12}}>
                  <div style={{display:"grid",gridTemplateColumns:"24px 1fr 80px 44px",padding:"8px 16px",background:P.bgDeep,borderBottom:`3px solid ${P.border}`}}>
                    {["#","Bileşen","Konsantrasyon","Skor"].map((h,i)=>(
                      <div key={i} style={{...pixel,fontSize:7,color:P.textLight,textAlign:i===3?"right":"left"}}>{h}</div>
                    ))}
                  </div>
                  {filtered?.map((ing,i)=>{
                    const meta=RM2[ing.rating]||RM2.unknown;
                    const realIdx=results.indexOf(ing);
                    const hasConflict=conflicts.some(cf=>[...(cf.aNames||[]),...(cf.bNames||[])].includes(ing.tr));
                    return(
                      <div key={i} className="row-px" onClick={()=>setActiveIdx(activeIdx===realIdx?null:realIdx)}
                        style={{display:"grid",gridTemplateColumns:"24px 1fr 80px 44px",alignItems:"center",padding:"12px 16px",borderBottom:i<filtered.length-1?`2px dashed ${P.borderLight}`:"none",background:activeIdx===realIdx?P.pinkDim:"transparent"}}>
                        <span style={{...pixel,fontSize:8,color:P.textLight}}>{ing.listIndex}</span>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                            <span style={{fontSize:16}}>{meta.emoji}</span>
                            <span style={{fontSize:13,color:P.text,fontWeight:500}}>{ing.tr}</span>
                            {hasConflict&&<span style={{...pixel,fontSize:7,padding:"1px 5px",background:P.riskyDim,color:P.risky,border:`1px solid ${P.riskyBorder}`}}>⚡</span>}
                            {ing.vitaminCTier===1&&<span style={{...pixel,fontSize:7,padding:"1px 5px",background:P.mintDim,color:P.mint,border:`1px solid ${P.mintBorder}`}}>Güçlü C</span>}
                          </div>
                          <div style={{fontSize:10,color:P.textLight,marginTop:2,paddingLeft:22}}>{ing.name} · {ing.cat}</div>
                        </div>
                        <div style={{...pixel,fontSize:7,color:ing.position==="Yüksek"?P.caution:ing.position==="Eser"?P.textLight:P.textMid}}>{ing.position}</div>
                        <div style={{...pixel,fontSize:14,color:meta.color,textAlign:"right"}}>{ing.score}</div>
                      </div>
                    );
                  })}
                </PixelCard>

                {/* DETAIL */}
                {active&&(
                  <div className="fade">
                    <PixelCard color={(RM2[active.rating]||RM2.unknown).border} style={{marginBottom:12}}>
                      <SectionHead emoji={(RM2[active.rating]||RM2.unknown).emoji} title={active.tr.toUpperCase()} color={(RM2[active.rating]||RM2.unknown).bg}/>
                      <div style={{padding:20}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                          <div style={{fontSize:11,color:P.textLight}}>#{active.listIndex} · {active.cat}</div>
                          <div style={{...pixel,fontSize:20,color:(RM2[active.rating]||RM2.unknown).color}}>{active.score}<span style={{fontSize:10,color:P.textLight}}>/100</span></div>
                        </div>
                        <p style={{fontSize:13,color:P.textMid,lineHeight:1.85,marginBottom:12}}>{active.desc}</p>
                        {active.vitaminCTier&&(
                          <div style={{padding:12,background:active.vitaminCTier<=2?P.mintDim:active.vitaminCTier===3?P.cautionDim:P.riskyDim,...px(active.vitaminCTier<=2?P.mintBorder:active.vitaminCTier===3?P.cautionBorder:P.riskyBorder,2),marginBottom:10}}>
                            <div style={{...pixel,fontSize:8,color:active.vitaminCTier<=2?P.mint:active.vitaminCTier===3?P.caution:P.risky,marginBottom:8}}>C VİTAMİNİ TİER {active.vitaminCTier}/4</div>
                            <div style={{display:"flex",gap:4,marginBottom:8}}>
                              {[1,2,3,4].map(t=><div key={t} style={{flex:1,height:8,background:t<=active.vitaminCTier?(active.vitaminCTier<=2?P.mint:active.vitaminCTier===3?P.caution:P.risky):P.border,...(t<=active.vitaminCTier?{}:{opacity:0.3})}}/>)}
                            </div>
                            <p style={{fontSize:12,color:P.text,lineHeight:1.6}}>
                              {active.vitaminCTier===1&&"En güçlü form — yüksek biyoyararlanım ✨"}
                              {active.vitaminCTier===2&&"İyi form — güvenilir etki 🌸"}
                              {active.vitaminCTier===3&&"Orta form — dönüşüm gerektirir 🌼"}
                              {active.vitaminCTier===4&&"Zayıf form — düşük biyoyararlanım 🍄"}
                            </p>
                          </div>
                        )}
                        {active.usage&&(
                          <div style={{padding:10,background:P.pinkDim,...px(P.pinkLight,2),marginBottom:10,fontSize:12,color:P.text,lineHeight:1.6}}>
                            <span style={{...pixel,fontSize:8,color:P.pink}}>💡 KULLANIM: </span>{active.usage}
                          </div>
                        )}
                        <div style={{fontSize:12,color:P.textMid,padding:"8px 12px",background:P.bgDeep,...px(P.border,2),marginBottom:active.concern?10:0}}>
                          📍 {active.positionNote}
                        </div>
                        {active.concern&&(
                          <div style={{padding:"10px 12px",background:P.riskyDim,...px(P.riskyBorder,2),fontSize:12,color:P.risky,lineHeight:1.6,marginTop:10}}>
                            ⚠️ {active.concern}
                          </div>
                        )}
                      </div>
                    </PixelCard>
                  </div>
                )}

                {/* SKIN SUITABILITY */}
                {(()=>{
                  const types=["dry","oily","combination","sensitive","normal"];
                  const LABELS={dry:"Kuru",oily:"Yağlı",combination:"Karma",sensitive:"Hassas",normal:"Normal"};
                  const EMOJIS={dry:"🏜️",oily:"✨",combination:"⚖️",sensitive:"🌸",normal:"🍃"};
                  const suits=types.map(type=>{
                    const avoid=results.filter(r=>r.avoid?.includes(type)).length;
                    const score=Math.max(0,Math.round(100-(avoid/results.length)*100));
                    return{type,label:LABELS[type],emoji:EMOJIS[type],score,avoid};
                  });
                  return(
                    <PixelCard color={P.lavender} style={{marginBottom:12}}>
                      <SectionHead emoji="🌈" title="CİLT TİPİNE UYGUNLUK" color={P.lavDim}/>
                      <div style={{padding:18,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
                        {suits.map(({type,label,emoji,score})=>{
                          const col=score>=80?P.safe:score>=55?P.caution:P.risky;
                          return(
                            <div key={type} style={{textAlign:"center"}}>
                              <div style={{fontSize:20,marginBottom:4}}>{emoji}</div>
                              <div style={{...pixel,fontSize:13,color:col,marginBottom:6}}>{score}</div>
                              <div style={{height:6,...px(P.border,1),marginBottom:4}}>
                                <div style={{height:"100%",width:`${score}%`,background:col}}/>
                              </div>
                              <div style={{...pixel,fontSize:7,color:P.textMid}}>{label}</div>
                            </div>
                          );
                        })}
                      </div>
                    </PixelCard>
                  );
                })()}

                {/* PROMISE ANALYSIS */}
                {(()=>{
                  const checks=[
                    {claim:"💧 Nemlendirme",evaluate(){
                      const a=results.filter(i=>["hyaluronic acid","sodium hyaluronate","glycerin","glycerol","panthenol","urea"].some(k=>i.name.toLowerCase().includes(k)));
                      if(!a.length)return{verdict:"Zayıf",color:P.risky,detail:"Güçlü nemlendirici yok."};
                      const pct=results.indexOf(a[0])/results.length;
                      if(pct<0.4)return{verdict:"Güçlü",color:P.mint,detail:`${a[0].tr} üst sıralarda.`};
                      if(pct<0.7)return{verdict:"Orta",color:P.caution,detail:`${a[0].tr} orta sıralarda.`};
                      return{verdict:"Zayıf",color:P.risky,detail:`${a[0].tr} listede geride.`};
                    }},
                    {claim:"⏳ Anti-Aging",evaluate(){
                      const a=results.filter(i=>["retinol","retinal","retinyl","bakuchiol","adenosine","peptide","ascorbic acid"].some(k=>i.name.toLowerCase().includes(k)));
                      if(!a.length)return{verdict:"Zayıf",color:P.risky,detail:"Anti-aging bileşen yok."};
                      return results.indexOf(a[0])<results.length*0.5?{verdict:"Güçlü",color:P.mint,detail:`${a[0].tr} etkin sırada.`}:{verdict:"Orta",color:P.caution,detail:`${a[0].tr} var ama geride.`};
                    }},
                    {claim:"✨ Leke Açma",evaluate(){
                      const a=results.filter(i=>["niacinamide","alpha arbutin","kojic acid","ascorbic acid","ascorbyl","azelaic acid","tranexamic"].some(k=>i.name.toLowerCase().includes(k)));
                      if(!a.length)return{verdict:"Zayıf",color:P.risky,detail:"Leke açıcı bileşen yok."};
                      return results.indexOf(a[0])<results.length*0.5?{verdict:"Güçlü",color:P.mint,detail:`${a[0].tr} etkin.`}:{verdict:"Orta",color:P.caution,detail:`${a[0].tr} mevcut.`};
                    }},
                    {claim:"🌸 Hassas Cilt",evaluate(){
                      const sooth=results.filter(i=>["allantoin","centella","aloe","panthenol","ceramide","green tea","squalane"].some(k=>i.name.toLowerCase().includes(k)));
                      const irr=results.filter(i=>["fragrance","parfum","alcohol denat","linalool","limonene"].some(k=>i.name.toLowerCase().includes(k)));
                      if(irr.length&&!sooth.length)return{verdict:"Yanıltıcı",color:P.risky,detail:`${irr[0].tr} irritan var.`};
                      if(irr.length)return{verdict:"Çelişkili",color:P.caution,detail:"İritan ve yatıştırıcı bir arada."};
                      if(sooth.length>=2)return{verdict:"Güçlü",color:P.mint,detail:"Yatıştırıcı formül."};
                      return sooth.length?{verdict:"Orta",color:P.caution,detail:"Kısmi yatıştırıcı."}:{verdict:"Zayıf",color:P.risky,detail:"Yatıştırıcı yok."};
                    }},
                    {claim:"🔬 Gözenek/Yağ",evaluate(){
                      const a=results.filter(i=>["niacinamide","salicylic acid","zinc","kaolin","bentonite"].some(k=>i.name.toLowerCase().includes(k)));
                      if(!a.length)return{verdict:"Zayıf",color:P.risky,detail:"Gözenek bileşeni yok."};
                      return{verdict:"Güçlü",color:P.mint,detail:`${a[0].tr} mevcut.`};
                    }},
                    {claim:"🛡️ Bariyer",evaluate(){
                      const cers=results.filter(i=>i.name.toLowerCase().includes("ceramide"));
                      if(cers.length>=2)return{verdict:"Güçlü",color:P.mint,detail:`${cers.length} seramid ✨`};
                      if(cers.length===1)return{verdict:"İyi",color:P.mint,detail:`${cers[0].tr} var.`};
                      return{verdict:"Zayıf",color:P.risky,detail:"Seramid kompleksi yok."};
                    }},
                    {claim:"☀️ SPF",evaluate(){
                      const sf=results.filter(i=>["zinc oxide","titanium dioxide","avobenzone","octocrylene","homosalate"].some(k=>i.name.toLowerCase().includes(k)));
                      if(!sf.length)return{verdict:"Yok",color:P.unknown,detail:"Güneş filtresi yok."};
                      const phys=sf.filter(a=>["zinc oxide","titanium dioxide"].some(k=>a.name.toLowerCase().includes(k)));
                      return phys.length?{verdict:"Güvenli",color:P.mint,detail:"Fiziksel filtre 🌸"}:{verdict:"Kimyasal",color:P.caution,detail:"Kimyasal filtre."};
                    }},
                  ];
                  return(
                    <PixelCard color={P.peach} style={{marginBottom:12}}>
                      <SectionHead emoji="🌺" title="VAATLER vs FORMÜL" color={P.peachDim}/>
                      <div style={{padding:16,display:"flex",flexDirection:"column",gap:8}}>
                        {checks.map((c,i)=>{
                          const res=c.evaluate();
                          return(
                            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto",alignItems:"center",gap:12,padding:"10px 12px",background:P.bgDeep,...px(P.border,2)}}>
                              <div>
                                <div style={{...pixel,fontSize:8,color:P.textMid,marginBottom:4}}>{c.claim}</div>
                                <div style={{fontSize:12,color:P.text,lineHeight:1.5}}>{res.detail}</div>
                              </div>
                              <span style={{...pixel,fontSize:8,padding:"4px 8px",background:`${res.color}20`,color:res.color,...px(res.color,2),whiteSpace:"nowrap"}}>{res.verdict}</span>
                            </div>
                          );
                        })}
                      </div>
                      <div style={{padding:"10px 16px",borderTop:`2px dashed ${P.peachBorder}`,fontSize:11,color:P.textLight}}>
                        ⚠️ Konsantrasyon bilinmeden kesin etkinlik garantisi verilemez.
                      </div>
                    </PixelCard>
                  );
                })()}

                {/* Footer */}
                <div style={{padding:"14px 0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{...pixel,fontSize:9,color:P.pink}}>Dr. Bengi Su Ege 🌸</div>
                    <div style={{fontSize:11,color:P.textLight}}>Genel bilgi · Tıbbi tavsiye değildir</div>
                  </div>
                  <button onClick={()=>setShowDisclaimer(true)} style={{...pixel,fontSize:8,color:P.risky,background:P.riskyDim,border:`2px solid ${P.riskyBorder}`,padding:"5px 10px",cursor:"pointer",boxShadow:`2px 2px 0 ${P.riskyBorder}`,fontFamily:"'Press Start 2P',monospace"}}>Yasal Uyarılar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── COMPARE ── */}
        {mode==="compare"&&(
          <div className="fade">
            <PixelCard color={P.lavender} style={{marginBottom:16}}>
              <SectionHead emoji="⚖️" title="ÜRÜN KARŞILAŞTIRMA" color={P.lavDim}/>
              <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                {[["A",compareA,setCompareA],["B",compareB,setCompareB]].map(([label,state,setState])=>(
                  <div key={label}>
                    <div style={{...pixel,fontSize:9,color:P.lavender,marginBottom:10}}>ÜRÜN {label}</div>
                    <ProductSearch q={state.productQ} setQ={q=>setState(s=>({...s,productQ:q}))}
                      suggs={state.productSuggs} setSuggs={ss=>setState(s=>({...s,productSuggs:ss}))}
                      onSearch={q=>searchProducts(q,ss=>setState(s=>({...s,productSuggs:ss})))}
                      onSelect={p=>{const r=parseIngredients(p.ingredients);setState(s=>({...s,input:p.ingredients,results:r,productQ:p.name,productSuggs:[]}));}}
                      small ghStatus={ghStatus}/>
                    <div style={{margin:"8px 0",height:1,background:P.border}}/>
                    <textarea value={state.input} onChange={e=>{const v=e.target.value;setState(s=>({...s,input:v}));}} placeholder="veya INCI yapıştır..." rows={3}
                      style={{width:"100%",background:P.bgDeep,border:`2px solid ${P.border}`,padding:10,color:P.text,fontSize:12,resize:"vertical"}}/>
                    <PxBtn onClick={()=>{const r=parseIngredients(state.input);setState(s=>({...s,results:r}));}} disabled={!state.input.trim()} color={P.lavender} style={{marginTop:8,width:"100%",textAlign:"center",display:"block"}}>
                      Analiz Et ✨
                    </PxBtn>
                  </div>
                ))}
              </div>
            </PixelCard>

            {compareA.results&&compareB.results&&(
              <div className="fade">
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  {[[compareA,"A",P.pink],[compareB,"B",P.lavender]].map(([state,label,col])=>{
                    const sc=calcScore(state.results);
                    const scCol=sc>=80?P.mint:sc>=60?P.caution:P.risky;
                    const bdg=BADGE_DEFS2.filter(b=>b.check(state.results));
                    const cfls=detectConflicts(state.results);
                    return(
                      <PixelCard key={label} color={col}>
                        <div style={{padding:"12px 16px",background:`${col}20`,borderBottom:`3px solid ${col}`,...pixel,fontSize:9,color:col}}>ÜRÜN {label}</div>
                        <div style={{padding:16}}>
                          <div style={{fontSize:12,color:P.textMid,marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{state.productQ||"Manuel giriş"}</div>
                          <div style={{...pixel,fontSize:32,color:scCol,lineHeight:1,marginBottom:8}}>{sc}<span style={{fontSize:12,color:P.textLight}}>/100</span></div>
                          <div style={{height:6,...px(P.border,1),marginBottom:10}}>
                            <div style={{height:"100%",width:`${sc}%`,background:scCol}}/>
                          </div>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
                            {bdg.slice(0,3).map(b=><span key={b.id} style={{...pixel,fontSize:7,padding:"2px 6px",background:P.yellowDim,color:P.peach,...px(P.yellowBorder,1)}}>{b.icon}</span>)}
                          </div>
                          {cfls.length>0&&<div style={{...pixel,fontSize:8,color:P.risky,padding:"5px 8px",background:P.riskyDim,...px(P.riskyBorder,1)}}>⚡ {cfls.length} çakışma</div>}
                        </div>
                      </PixelCard>
                    );
                  })}
                </div>

                {(()=>{
                  const sA=calcScore(compareA.results),sB=calcScore(compareB.results);
                  const w=sA>sB?"A":sB>sA?"B":null;
                  return(
                    <PixelCard color={w?P.yellow:P.border} style={{marginBottom:12}}>
                      <div style={{padding:20,textAlign:"center"}}>
                        {w?(
                          <>
                            <div style={{fontSize:32,marginBottom:8}}>🏆</div>
                            <div style={{...pixel,fontSize:12,color:P.peach,marginBottom:6}}>ÜRÜN {w} ÖNE ÇIKIYOR</div>
                            <div style={{fontSize:13,color:P.textMid}}>Fark: {Math.abs(sA-sB)} puan</div>
                          </>
                        ):<div style={{...pixel,fontSize:10,color:P.textMid}}>EŞİT SKOR 🌸</div>}
                      </div>
                    </PixelCard>
                  );
                })()}

                <PixelCard color={P.border}>
                  <SectionHead emoji="🔍" title="ORTAK & FARKLI BİLEŞENLER" color={P.bgDeep}/>
                  {(()=>{
                    const kA=new Set(compareA.results.map(i=>i.tr));
                    const kB=new Set(compareB.results.map(i=>i.tr));
                    const onlyA=[...kA].filter(k=>!kB.has(k)).slice(0,6);
                    const onlyB=[...kB].filter(k=>!kA.has(k)).slice(0,6);
                    const common=[...kA].filter(k=>kB.has(k)).slice(0,6);
                    return(
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderTop:`3px solid ${P.border}`}}>
                        {[["Sadece A'da",onlyA,P.pink],["Ortak",common,P.peach],["Sadece B'de",onlyB,P.lavender]].map(([title,list,col])=>(
                          <div key={title} style={{padding:14,borderRight:col!==P.lavender?`2px dashed ${P.border}`:"none"}}>
                            <div style={{...pixel,fontSize:7,color:col,marginBottom:10}}>{title}</div>
                            {list.map(k=><div key={k} style={{fontSize:11,color:P.text,padding:"3px 0",borderBottom:`1px dashed ${P.borderLight}`}}>{k}</div>)}
                            {!list.length&&<div style={{fontSize:11,color:P.textLight}}>—</div>}
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </PixelCard>
              </div>
            )}
          </div>
        )}

        {/* ── ROUTINE ── */}
        {mode==="routine"&&(
          <div className="fade">
            <PixelCard color={P.peach} style={{marginBottom:12}}>
              <SectionHead emoji="🌅" title="RUTİN OLUŞTURUCU" color={P.peachDim}/>
              <div style={{padding:18}}>
                <ProductSearch q={routineQ} setQ={setRoutineQ} suggs={routineSuggs} setSuggs={setRoutineSuggs}
                  onSearch={q=>searchProducts(q,s=>setRoutineSuggs(s))}
                  onSelect={p=>{
                    if(routineProducts.find(rp=>rp.name===p.name))return;
                    setRoutineProducts(prev=>[...prev,{name:p.name,brand:p.brand,cat:p.cat||"",ingredients:p.ingredients,parsed:parseIngredients(p.ingredients)}]);
                    setRoutineQ("");setRoutineSuggs([]);setRoutineResult(null);
                  }}
                  ghStatus={ghStatus} totalCount={allProducts.length}/>
                <div style={{margin:"10px 0",height:2,background:`repeating-linear-gradient(90deg,${P.border} 0,${P.border} 6px,transparent 6px,transparent 12px)`}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <input value={manualName} onChange={e=>setManualName(e.target.value)} placeholder="Ürün adı"
                    style={{background:P.bgDeep,border:`3px solid ${P.border}`,padding:"10px 12px",color:P.text,fontSize:13,boxShadow:`3px 3px 0 ${P.border}`}}/>
                  <div style={{display:"flex",gap:6}}>
                    <input value={manualIng} onChange={e=>setManualIng(e.target.value)} placeholder="Water, Glycerin..."
                      style={{flex:1,background:P.bgDeep,border:`3px solid ${P.border}`,padding:"10px 12px",color:P.text,fontSize:13,boxShadow:`3px 3px 0 ${P.border}`}}/>
                    <PxBtn onClick={()=>{
                      if(!manualName.trim()||!manualIng.trim())return;
                      setRoutineProducts(prev=>[...prev,{name:manualName.trim(),brand:"",cat:"",ingredients:manualIng.trim(),parsed:parseIngredients(manualIng.trim())}]);
                      setManualName("");setManualIng("");setRoutineResult(null);
                    }} color={P.peach}>+ Ekle</PxBtn>
                  </div>
                </div>
              </div>
            </PixelCard>

            {routineProducts.length>0&&(
              <PixelCard color={P.border} style={{marginBottom:12}}>
                <SectionHead emoji="🛍️" title={`EKLENEN ÜRÜNLER (${routineProducts.length})`} color={P.bgDeep}/>
                {routineProducts.map((p,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<routineProducts.length-1?`2px dashed ${P.borderLight}`:"none"}}>
                    <span style={{fontSize:16}}>{guessTime(p)==="morning"?"🌅":guessTime(p)==="evening"?"🌙":"🌸"}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:P.text,fontWeight:500}}>{p.name}</div>
                      {p.brand&&<div style={{fontSize:10,color:P.pink}}>{p.brand}</div>}
                    </div>
                    <button onClick={()=>{setRoutineProducts(prev=>prev.filter((_,j)=>j!==i));setRoutineResult(null);}}
                      style={{background:P.riskyDim,border:`2px solid ${P.riskyBorder}`,color:P.risky,width:28,height:28,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                  </div>
                ))}
                <div style={{padding:14,borderTop:`3px solid ${P.border}`}}>
                  <PxBtn onClick={buildRoutine} style={{width:"100%",textAlign:"center",display:"block"}}>🌸 Rutini Oluştur</PxBtn>
                </div>
              </PixelCard>
            )}

            {routineResult&&(
              <div className="fade">
                {routineResult.conflicts.length>0&&(
                  <PixelCard color={P.risky} style={{marginBottom:12}}>
                    <SectionHead emoji="⚡" title="UYARILAR" color={P.riskyDim}/>
                    {routineResult.conflicts.map((cf,i)=>(
                      <div key={i} style={{padding:"12px 16px",borderBottom:i<routineResult.conflicts.length-1?`2px dashed ${P.riskyBorder}`:"none"}}>
                        <span style={{...pixel,fontSize:8,color:cf.severity==="high"?P.risky:P.caution,marginBottom:4,display:"block"}}>{cf.severity==="high"?"⚡ YÜKSEK":"🟡 ORTA"}</span>
                        <div style={{fontSize:12,color:P.textMid,lineHeight:1.7}}>{cf.msg}</div>
                      </div>
                    ))}
                  </PixelCard>
                )}

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  {[{session:"morning",label:"🌅 SABAH RUTİNİ",list:routineResult.morning,col:P.yellow,dim:P.yellowDim,border:P.yellowBorder},
                    {session:"evening",label:"🌙 AKŞAM RUTİNİ",list:routineResult.evening,col:P.lavender,dim:P.lavDim,border:P.lavBorder}].map(({label,list,col,dim,border})=>(
                    <PixelCard key={label} color={col}>
                      <div style={{padding:"10px 14px",background:dim,borderBottom:`3px solid ${border}`,...pixel,fontSize:8,color:col}}>{label}</div>
                      {list.length===0?<div style={{padding:16,fontSize:12,color:P.textLight,textAlign:"center"}}>Bu seans için ürün yok 🌸</div>:
                        list.map((p,i)=>(
                          <div key={i} style={{padding:"12px 14px",borderBottom:i<list.length-1?`2px dashed ${border}`:"none"}}>
                            <div style={{...pixel,fontSize:7,color:col,marginBottom:4}}>{i+1}. {p.step}</div>
                            <div style={{fontSize:13,color:P.text,fontWeight:500}}>{p.name}</div>
                            {p.brand&&<div style={{fontSize:10,color:P.textLight}}>{p.brand}</div>}
                            <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                              {p.actives.retinoid&&<span style={{...pixel,fontSize:7,padding:"1px 5px",background:P.lavDim,color:P.lavender,...px(P.lavBorder,1)}}>Retinoid</span>}
                              {(p.actives.aha||p.actives.bha)&&<span style={{...pixel,fontSize:7,padding:"1px 5px",background:P.cautionDim,color:P.caution,...px(P.cautionBorder,1)}}>Asit</span>}
                              {p.actives.vitaminC&&<span style={{...pixel,fontSize:7,padding:"1px 5px",background:P.mintDim,color:P.mint,...px(P.mintBorder,1)}}>C Vit.</span>}
                            </div>
                          </div>
                        ))}
                    </PixelCard>
                  ))}
                </div>

                {routineResult.tips.length>0&&(
                  <PixelCard color={P.mint} style={{marginBottom:12}}>
                    <SectionHead emoji="💡" title="UZMAN İPUÇLARI" color={P.mintDim}/>
                    <div style={{padding:16,display:"flex",flexDirection:"column",gap:8}}>
                      {routineResult.tips.map((t,i)=>(
                        <div key={i} style={{fontSize:13,color:P.text,lineHeight:1.7,paddingLeft:14,borderLeft:`4px solid ${P.mint}`,padding:"6px 12px",background:P.mintDim}}>{t}</div>
                      ))}
                    </div>
                  </PixelCard>
                )}

                {routineResult.conflicts.length===0&&(
                  <div style={{padding:"12px 16px",background:P.mintDim,...px(P.mintBorder,2),fontSize:13,color:P.mint,marginBottom:12}}>
                    ✓ Çakışma tespit edilmedi! 🌸
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PRODUCT SEARCH COMPONENT ─────────────────────────────────────────────────
function ProductSearch({q,setQ,suggs,setSuggs,onSearch,onSelect,small,ghStatus,totalCount}){
  const C2={bgDeep:"#fff0f7",border:"#f0a8cc",text:"#5a2d4c",textLight:"#c49ab4",gold:"#e8679a",goldDim:"#fde8f3",goldBorder:"#e8679a50",purpleDim:"#ffd6ec",bgCard:"#fff8fc",safe:"#5cba8a",safeDim:"#d0f0e0",safeBorder:"#90d8b0",caution:"#f0a030",cautionDim:"#fff0d0"};
  return(
    <div style={{position:"relative"}}>
      <div style={{marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontSize:11,color:C2.textLight,letterSpacing:1}}>
          {small?"Ürün ara":"İsim veya marka ile ara"}
        </span>
        {ghStatus==="loading"&&(
          <span style={{fontSize:10,color:C2.caution,display:"flex",alignItems:"center",gap:4}}>
            <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",border:`1.5px solid ${C2.caution}`,borderTopColor:"transparent",animation:"spin 0.7s linear infinite"}}/>
            Veritabanı yükleniyor…
          </span>
        )}
        {ghStatus==="ok"&&totalCount&&(
          <span style={{fontSize:10,color:C2.safe}}>✓ {totalCount} ürün hazır</span>
        )}
        {ghStatus==="err"&&(
          <span style={{fontSize:10,color:"#e85060"}}>⚠ Veritabanı yüklenemedi</span>
        )}
      </div>
      <div style={{position:"relative"}}>
        <input value={q} onChange={e=>{setQ(e.target.value);onSearch(e.target.value);}}
          placeholder={small?"Ürün ara...":"CeraVe, Cosrx, Anua, Farmasi, The Ordinary..."}
          style={{width:"100%",background:C2.bgDeep,border:`1px solid ${C2.border}`,borderRadius:10,padding:`${small?"10px":"13px"} 38px ${small?"10px":"13px"} 14px`,color:C2.text,fontSize:small?13:15,outline:"none",fontFamily:"'DM Sans',sans-serif",transition:"border-color 0.2s"}}
          onFocus={e=>e.target.style.borderColor=C2.gold} onBlur={e=>setTimeout(()=>{e.target.style.borderColor=C2.border;},200)}/>
        <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.4}}>🔍</span>
      </div>
      {suggs.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C2.bgCard,border:`1px solid ${C2.goldBorder}`,borderRadius:12,overflow:"hidden",zIndex:30,boxShadow:"0 12px 40px rgba(0,0,0,0.5)",maxHeight:300,overflowY:"auto"}}>
          {suggs.map((p,i)=>(
            <div key={i} onMouseDown={()=>onSelect(p)}
              style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<suggs.length-1?`1px solid ${C2.border}`:"none"}}
              onMouseEnter={e=>e.currentTarget.style.background=C2.purpleDim}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{fontSize:13,color:C2.text,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>{p.name}</div>
              <div style={{fontSize:11,color:C2.gold,fontFamily:"'DM Sans',sans-serif",marginTop:2}}>{p.brand}{p.cat?" · "+p.cat:""}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
