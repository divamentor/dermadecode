  const position=pct<0.15?"Yüksek":pct<0.4?"Orta-Yüksek":pct<0.65?"Orta":pct<0.85?"Düşük":"Eser";
  const positionNote=pct<0.15?"Üst sıralarda — yüksek konsantrasyon":pct<0.4?"İlk yarıda — orta-yüksek":pct<0.65?"Ortada — orta":pct<0.85?"İkinci yarıda — düşük":"Sonda — genellikle <%1";
  return {name:raw.trim(),position,positionNote,listIndex:index+1,...base};
}
function parseIngredients(text){
  const items=text.split(/[,\n;]+/).map(s=>s.trim()).filter(Boolean);
  return items.map((item,i)=>lookupIngredient(item,i,items.length));
}

];

function detectConflicts(items){
  const keys=items.map(i=>i.name.toLowerCase());
  const found=[];
  for(const c of CONFLICTS){
    const hasA=c.a.some(a=>keys.some(k=>k.includes(a)||a.includes(k)));
    const hasB=c.b.some(b=>keys.some(k=>k.includes(b)||b.includes(k)));
    if(hasA&&hasB){
      // find actual ingredient names
      const aNames=items.filter(i=>c.a.some(a=>i.name.toLowerCase().includes(a)||a.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const bNames=items.filter(i=>c.b.some(b=>i.name.toLowerCase().includes(b)||b.includes(i.name.toLowerCase()))).map(i=>i.tr);
      const key=c.title;
      if(!found.find(f=>f.title===key)) found.push({...c,aNames:[...new Set(aNames)],bNames:[...new Set(bNames)]});
    }
  }
  return found;
}

function calcScore(items){
  if(!items||!items.length)return 0;
  const w=items.map(ing=>{
    let s=ing.rating==="unknown"?45:ing.score;
    if(ing.vitaminCTier===3)s=Math.min(s,72);
    const wt=ing.rating==="risky"?1.5:1;
    return{s,wt};
  });
  const tw=w.reduce((a,b)=>a+b.wt,0);
  return Math.round(w.reduce((a,b)=>a+b.s*b.wt,0)/tw);
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k,v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(e.style, v);
      } else if (k.startsWith('on') && typeof v === 'function') {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'class') {
        e.className = v;
      } else if (k !== 'key') {
        e.setAttribute(k, v);
      }
    }
  }
  for (const child of children.flat(Infinity)) {
    if (child === null || child === undefined || child === false) continue;
    if (typeof child === 'string' || typeof child === 'number') {
      e.appendChild(document.createTextNode(child));
    } else if (child instanceof Node) {
      e.appendChild(child);
    }
  }
  return e;
}

function div(style, ...children) { return el('div', {style}, ...children); }
function span(style, ...children) { return el('span', {style}, ...children); }
function btn(style, onClick, ...children) {
  const b = el('button', {style, onclick: onClick}, ...children);
  b.addEventListener('mouseenter', () => { b.style.transform = 'translate(-1px,-1px)'; });
  b.addEventListener('mouseleave', () => { b.style.transform = ''; });
  return b;
}
function inp(style, value, onInput, placeholder, rows) {
  if (rows) {
    const t = el('textarea', {style, placeholder, rows});
    t.value = value || '';
    t.addEventListener('input', e => onInput(e.target.value));
    return t;
  }
  const i = el('input', {style, placeholder});
  i.value = value || '';
  i.addEventListener('input', e => onInput(e.target.value));
  return i;
}

  if (!q || q.trim().length < 2) { cb([]); return; }
  const ql = q.toLowerCase().trim();
  const words = ql.split(/\s+/);
  const scored = STATE.allProducts.map(p => {
    const hay = (p.name+' '+p.brand+' '+(p.cat||'')).toLowerCase();
    let s = 0;
    if (hay.includes(ql)) s += 100;
    words.forEach(w => { if (hay.includes(w)) s += 20; });
    if (p.brand.toLowerCase().includes(ql)) s += 40;
    if (p.name.toLowerCase().startsWith(ql)) s += 30;
    return {...p, _s:s};
  }).filter(p=>p._s>0).sort((a,b)=>b._s-a._s).slice(0,8);
  cb(scored);
}

function answerQuiz(type) {
  const ans = [...STATE.quizAnswers, type];
  if (STATE.quizStep < QUIZ.length-1) {
    setState({quizAnswers:ans, quizStep:STATE.quizStep+1});
  } else {
    const counts = {};
    ans.forEach(t => { counts[t]=(counts[t]||0)+1; });
    const skinType = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
    setState({quizResult:skinType});
  }
}

const STEPS_M = ["Temizleyici","Tonik / Esans","C Vitamini Serumu","Serum (Aktif)","Göz Kremi","Nemlendirici","Güneş Koruma"];
const STEPS_E = ["Temizleyici (Yağ Bazlı)","Temizleyici","Tonik / Esans","Asit / Peeling","Serum (Aktif)","Retinoid","Göz Kremi","Nemlendirici","Onarıcı"];

function guessTime(p) {
  const n = (p.name+' '+(p.cat||'')).toLowerCase();
  if (/spf|sunscreen|güneş/.test(n)) return 'morning';
  if (/night|gece|retinol|retinal|peeling|aha|bha|glycolic|salicylic/.test(n)) return 'evening';
  if (/cleansing oil|oil cleanser/.test(n)) return 'evening';
  return 'both';
}

function guessStep(p, s) {
  const n = (p.name+' '+(p.cat||'')).toLowerCase();
  if (/spf|sunscreen|güneş/.test(n)) return 'Güneş Koruma';
  if (/retinol|retinal|retinoid/.test(n)) return 'Retinoid';
  if (/cleansing oil|cleansing balm/.test(n)) return 'Temizleyici (Yağ Bazlı)';
  if (/cleanser|temizleyici|foam|micellar|wash/.test(n)) return 'Temizleyici';
  if (/eye|göz/.test(n)) return 'Göz Kremi';
  if (/toner|tonik|essence|esans|pad/.test(n)) return 'Tonik / Esans';
  if (/peeling|exfoliant|aha|bha/.test(n)) return 'Asit / Peeling';
  if (s==='morning' && /ascorbic|vitamin c serum/.test(n)) return 'C Vitamini Serumu';
  if (/serum|ampoule|booster/.test(n)) return 'Serum (Aktif)';
  if (/ointment|healing|onarıcı/.test(n)) return 'Onarıcı';
  return 'Nemlendirici';
}

function getActives(parsed) {
  const k = parsed.map(i=>i.name.toLowerCase());
  const has = terms => terms.some(t=>k.some(ki=>ki.includes(t)));
  return {
    retinoid: has(['retinol','retinal','granactive']),
    vitaminC: has(['ascorbic acid','3-o-ethyl']),
    aha: has(['glycolic acid','lactic acid','mandelic acid']),
    bha: has(['salicylic acid']),
    niacinamide: has(['niacinamide']),
    benzoyl: has(['benzoyl peroxide']),
  };
}

function buildRoutine() {
  if (!STATE.routineProducts.length) return;
  const tagged = STATE.routineProducts.map(p=>({...p,time:guessTime(p),actives:getActives(p.parsed)}));
  const srt = (list, steps) => list.sort((a,b)=>{
    const ai=steps.indexOf(a.step), bi=steps.indexOf(b.step);
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  });
  const morning = srt(tagged.filter(p=>p.time==='morning'||p.time==='both').map(p=>({...p,step:guessStep(p,'morning')})), STEPS_M);
  const evening = srt(tagged.filter(p=>p.time==='evening'||p.time==='both').map(p=>({...p,step:guessStep(p,'evening')})), STEPS_E);
  const cfls = [];
  morning.filter(p=>p.actives.retinoid).forEach(p=>cfls.push({sev:'high',msg:'"'+p.name+'" sabah rutininde ama retinoid içeriyor — sadece akşam kullanılmalı!'}));
  const eA=evening.filter(p=>p.actives.aha||p.actives.bha), eR=evening.filter(p=>p.actives.retinoid);
  if (eA.length&&eR.length) cfls.push({sev:'high',msg:'Asit + Retinoid aynı akşamda — farklı gecelere ayır!'});
  const vcP=tagged.filter(p=>p.actives.vitaminC), niaP=tagged.filter(p=>p.actives.niacinamide);
  if (vcP.length&&niaP.length&&vcP.some(v=>niaP.some(n=>n.name!==v.name)))
    cfls.push({sev:'medium',msg:'C vitamini + Niasinamid yüksek konsantrasyonda sararma riski.'});
  const tips = [];
  if (eR.length) tips.push('🌙 Retinoid kullanırken sabah mutlaka SPF uygula!');
  if (!morning.some(p=>/spf|sunscreen|güneş/.test((p.name+p.cat).toLowerCase())))
    tips.push('☀️ Sabah rutininde SPF yok — aktif kullanıyorsan şart!');
  if (vcP.length) tips.push('✨ C vitaminini sabah kullan — antioksidan koruması gündüz en değerli.');
  setState({routineResult:{morning,evening,conflicts:cfls,tips}});
}

function buildProductSearch(q, setQ, suggs, setSuggs, onSearch, onSelect, small) {
  const wrapper = div({position:'relative'});
  const label = div({marginBottom:'6px',fontSize:'11px',color:P.textLight}, 'Ürün ara (isim veya marka)');
  const inputWrap = div({position:'relative'});
  const input = el('input', {
    placeholder: small ? 'Ürün ara...' : 'CeraVe, Cosrx, Anua, Farmasi...',
    style: {
      width:'100%',
      background:P.bgDeep,
      border:`3px solid ${P.border}`,
      boxShadow:`3px 3px 0 ${P.border}`,
      padding: small ? '9px 34px 9px 12px' : '12px 34px 12px 12px',
      color:P.text,
      fontSize: small ? '13px' : '15px',
      fontFamily:"'DM Sans',sans-serif",
    }
  });
  input.value = q || '';
  const icon = span({position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',fontSize:'14px',opacity:'0.5'}, '🔍');
  inputWrap.appendChild(input);
  inputWrap.appendChild(icon);

  let suggBox = null;
  function updateSuggs(list) {
    if (suggBox) suggBox.remove();
    if (!list.length) return;
    suggBox = div({
      position:'absolute',top:'calc(100% + 4px)',left:'0',right:'0',
      background:P.bgCard,
      border:`3px solid ${P.pinkLight}`,
      boxShadow:`4px 4px 0 ${P.pink}`,
      zIndex:'30',maxHeight:'280px',overflowY:'auto',
    });
    list.forEach((p,i) => {
      const row = div({
        padding:'10px 14px',cursor:'pointer',
        borderBottom: i<list.length-1 ? `2px dashed ${P.borderLight}` : 'none',
      },
        div({fontSize:'13px',color:P.text,fontWeight:'500'}, p.name),
        div({fontSize:'11px',color:P.pink,marginTop:'2px'}, p.brand+(p.cat?' · '+p.cat:''))
      );
      row.addEventListener('mouseenter', ()=>row.style.background=P.bgHover);
      row.addEventListener('mouseleave', ()=>row.style.background='transparent');
      row.addEventListener('mousedown', e => { e.preventDefault(); onSelect(p); if(suggBox){suggBox.remove();suggBox=null;} });
      suggBox.appendChild(row);
    });
    wrapper.appendChild(suggBox);
  }

  input.addEventListener('input', e => {
    setQ(e.target.value);
    onSearch(e.target.value, updateSuggs);
  });
  input.addEventListener('blur', () => { setTimeout(()=>{ if(suggBox){suggBox.remove();suggBox=null;} }, 200); });

  wrapper.appendChild(label);
  wrapper.appendChild(inputWrap);
  return wrapper;
}

function buildCompare() {
  const wrap = div({});
  const mainCard = card(P.lavender, sectionHead('⚖️','ÜRÜN KARŞILAŞTIRMA',P.lavDim));
  const grid = div({padding:'16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'});
  ['A','B'].forEach(label => {
    const state = label==='A'?STATE.compareA:STATE.compareB;
    const setState2 = patch => {
      const key = label==='A'?'compareA':'compareB';
      setState({[key]:{...(label==='A'?STATE.compareA:STATE.compareB),...patch}});
    };
    const col = div({});
    col.appendChild(div({fontFamily:"'Press Start 2P',monospace",fontSize:'9px',color:P.lavender,marginBottom:'10px'},'ÜRÜN '+label));
    const ps = buildProductSearch(
      state.productQ,
      q=>setState2({productQ:q}),
      state.productSuggs,
      ss=>setState2({productSuggs:ss}),
      (q,cb)=>searchProds(q,cb),
      p=>{const r=parseIngredients(p.ingredients);setState2({input:p.ingredients,results:r,productQ:p.name,productSuggs:[]});},
      true
    );
    col.appendChild(ps);
    col.appendChild(div({margin:'8px 0',height:'1px',background:P.border}));
    const ta=el('textarea',{placeholder:'veya INCI yapıştır...',rows:'3',style:{width:'100%',background:P.bgDeep,border:`2px solid ${P.border}`,padding:'10px',color:P.text,fontSize:'12px',resize:'vertical',fontFamily:"'DM Sans',sans-serif"}});
    ta.value=state.input||'';
    ta.addEventListener('input',e=>setState2({input:e.target.value}));
    col.appendChild(ta);
    col.appendChild(div({height:'6px'}));
    col.appendChild(pxBtn('Analiz Et ✨',()=>{const r=parseIngredients(state.input);setState2({results:r});},P.lavender,!state.input.trim(),true));
    grid.appendChild(col);
  });
  mainCard.appendChild(grid);
  wrap.appendChild(mainCard);

  const A=STATE.compareA.results, B=STATE.compareB.results;
  if (!A||!B) return wrap;

  wrap.appendChild(div({height:'12px'}));
  const scoreGrid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'12px'});
  [[A,'A',P.pink,STATE.compareA],[B,'B',P.lavender,STATE.compareB]].forEach(([res,label,col,state])=>{
    const sc=calcScore(res),scC=sc>=80?P.mint:sc>=60?P.caution:P.risky;
    const bd=BADGES.filter(b=>b.check(res)),cf=detectConflicts(res);
    const c=div({background:P.bgCard,border:`3px solid ${col}`,boxShadow:`4px 4px 0 ${col}`});
    c.appendChild(div({padding:'10px 14px',background:col+'20',borderBottom:`3px solid ${col}`,fontFamily:"'Press Start 2P',monospace",fontSize:'9px',color:col},'ÜRÜN '+label));
    const inner=div({padding:'16px'});
    inner.appendChild(div({fontSize:'12px',color:P.textMid,marginBottom:'10px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},state.productQ||'Manuel giriş'));
    inner.appendChild(div({fontFamily:"'Press Start 2P',monospace",fontSize:'30px',color:scC,marginBottom:'8px'},sc,span({fontSize:'12px',color:P.textLight},'/100')));
    const pb=div({height:'5px',border:`2px solid ${P.border}`,marginBottom:'10px'});pb.appendChild(div({height:'100%',width:sc+'%',background:scC}));inner.appendChild(pb);
    if(bd.length){const br=div({display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'8px'});bd.slice(0,3).forEach(b=>br.appendChild(span({fontFamily:"'Press Start 2P',monospace",fontSize:'7px',padding:'2px 5px',background:P.yellowDim,color:P.peach,border:`1px solid ${P.yellowBorder}`},b.icon)));inner.appendChild(br);}
    if(cf.length)inner.appendChild(div({fontFamily:"'Press Start 2P',monospace",fontSize:'8px',color:P.risky,padding:'5px 8px',background:P.riskyDim,border:`1px solid ${P.riskyBorder}`},'⚡ '+cf.length+' çakışma'));
    c.appendChild(inner);scoreGrid.appendChild(c);
  });
  wrap.appendChild(scoreGrid);

  const sA=calcScore(A),sB=calcScore(B),w=sA>sB?'A':sB>sA?'B':null;
  const winner=div({background:P.bgCard,border:`3px solid ${w?P.yellow:P.border}`,boxShadow:`4px 4px 0 ${w?P.yellow:P.border}`,marginBottom:'12px',padding:'20px',textAlign:'center'});
  if(w){winner.appendChild(div({fontSize:'32px',marginBottom:'8px'},'🏆'));winner.appendChild(div({fontFamily:"'Press Start 2P',monospace",fontSize:'12px',color:P.peach,marginBottom:'6px'},'ÜRÜN '+w+' ÖNE ÇIKIYOR'));winner.appendChild(div({fontSize:'13px',color:P.textMid},'Fark: '+Math.abs(sA-sB)+' puan'));}
  else winner.appendChild(div({fontFamily:"'Press Start 2P',monospace",fontSize:'10px',color:P.textMid},'EŞİT SKOR 🌸'));
  wrap.appendChild(winner);

  const diffCard=card(P.border,sectionHead('🔍','ORTAK & FARKLI',P.bgDeep));
  const kA=new Set(A.map(i=>i.tr)),kB=new Set(B.map(i=>i.tr));

  const diffGrid=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderTop:`3px solid ${P.border}`});
  [["Sadece A'da",oA,P.pink],['Ortak',cm,P.peach],['Sadece B',oB,P.lavender]].forEach(([t,list,col])=>{
    const d=div({padding:'14px',borderRight:col!==P.lavender?`2px dashed ${P.border}`:'none'});

    if(!list.length)d.appendChild(div({fontSize:'11px',color:P.textLight},'—'));
    list.forEach(k=>d.appendChild(div({fontSize:'11px',color:P.text,padding:'3px 0',borderBottom:`1px dashed ${P.borderLight}`},k)));
    diffGrid.appendChild(d);
  });
  diffCard.appendChild(diffGrid);
  wrap.appendChild(diffCard);
  return wrap;
}

        if(p.brand)row.appendChild(div({fontSize:'10px',color:P.textLight},p.brand));
        const tags=div({display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'});
        if(p.actives.retinoid)tags.appendChild(span({fontFamily:"'Press Start 2P',monospace",fontSize:'7px',padding:'1px 5px',background:P.lavDim,color:P.lavender,border:`1px solid ${P.lavBorder}`},'Retinoid'));
        if(p.actives.aha||p.actives.bha)tags.appendChild(span({fontFamily:"'Press Start 2P',monospace",fontSize:'7px',padding:'1px 5px',background:P.cautionDim,color:P.caution,border:`1px solid ${P.cautionBorder}`},'Asit'));
        if(p.actives.vitaminC)tags.appendChild(span({fontFamily:"'Press Start 2P',monospace",fontSize:'7px',padding:'1px 5px',background:P.mintDim,color:P.mint,border:`1px solid ${P.mintBorder}`},'C Vit.'));
        row.appendChild(tags);c.appendChild(row);
      });
      rGrid.appendChild(c);
    });
    wrap.appendChild(rGrid);
    if(rr.tips.length){
      const tipCard=card(P.mint,sectionHead('💡','UZMAN İPUÇLARI',P.mintDim));
      const tipInner=div({padding:'16px',display:'flex',flexDirection:'column',gap:'8px'});
      rr.tips.forEach(t=>tipInner.appendChild(div({fontSize:'13px',color:P.text,lineHeight:'1.7',padding:'6px 12px',borderLeft:`4px solid ${P.mint}`,background:P.mintDim},t)));
      tipCard.appendChild(tipInner);wrap.appendChild(tipCard);
    }
    if(!rr.conflicts.length)wrap.appendChild(div({padding:'12px 16px',background:P.mintDim,border:`2px solid ${P.mintBorder}`,fontSize:'13px',color:P.mint},'✓ Çakışma tespit edilmedi! 🌸'));
  }
  return wrap;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(type) {
  let modal = document.getElementById('modal');
  if (!modal) {
    modal = div({position:'fixed',inset:'0',background:'rgba(90,45,76,0.75)',zIndex:'100',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'});
    modal.id='modal';
    modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
    document.body.appendChild(modal);
  }
  modal.innerHTML='';
  const inner = div({background:P.bgCard,maxWidth:'440px',width:'100%',border:`3px solid ${P.pink}`,boxShadow:`5px 5px 0 ${P.pink}`});
  inner.addEventListener('click',e=>e.stopPropagation());
  inner.appendChild(div({fontFamily:"'Press Start 2P',monospace",fontSize:'9px',background:P.pink,color:'#fff',padding:'12px 16px'},'⚠️ YASAL UYARI'));
  const body=div({padding:'20px'});
  body.appendChild(div({fontSize:'13px',color:P.text,lineHeight:'1.9',marginBottom:'16px'},
    'Bu platform ',el('strong',{style:{color:P.pink}},'Dr. Bengi Su Ege'),
    ' tarafından genel bilgilendirme amacıyla hazırlanmıştır. Tıbbi tavsiye değildir. Konsantrasyon tahminleri INCI sırasına dayalıdır.'));
  body.appendChild(pxBtn('Anladım! 🌸',()=>modal.remove(),P.pink,false,true));
  inner.appendChild(body);
  modal.appendChild(inner);
}

// ── Floating deco ─────────────────────────────────────────────────────────────
function addFloatingDeco() {
  const decos=[
    {e:'🦋',x:5,y:10,d:0,s:8},{e:'🌸',x:88,y:15,d:1,s:9},
    {e:'🦋',x:15,y:75,d:2,s:11},{e:'🌼',x:80,y:70,d:.5,s:7},
    {e:'⭐',x:50,y:5,d:3,s:10},{e:'🌺',x:92,y:45,d:1.5,s:8},
    {e:'🦋',x:3,y:45,d:4,s:9},{e:'🌸',x:70,y:88,d:2.5,s:12},
    {e:'✨',x:25,y:90,d:1,s:7},{e:'🌷',x:60,y:3,d:3.5,s:10},
  ];
  const container = div({position:'fixed',inset:'0',pointerEvents:'none',zIndex:'0',overflow:'hidden'});
  decos.forEach((it,i)=>{
    const d=span({position:'absolute',left:it.x+'%',top:it.y+'%',fontSize:it.e==='🦋'?'22px':'16px',animation:`float${i%3} ${it.s}s ease-in-out ${it.d}s infinite`,opacity:'0.55'},it.e);
    container.appendChild(d);
  });
  document.body.appendChild(container);
}

// ── Main render ───────────────────────────────────────────────────────────────
function buildNav() {
  const modes=[{id:'analyze',label:'🔍 Analiz'},{id:'compare',label:'⚖️ Karşılaştır'},{id:'quiz',label:'🎯 Quiz'},{id:'routine',label:'🌅 Rutin'}];
  const row=div({display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'});
  modes.forEach(m=>{
    const active=STATE.mode===m.id;
    const b=el('button',{style:{fontFamily:"'Press Start 2P',monospace",fontSize:'9px',padding:'7px 11px',cursor:'pointer',background:active?P.pink:P.bgCard,color:active?'#fff':P.textMid,border:`3px solid ${active?P.pinkDark:P.border}`,boxShadow:`${active?3:2}px ${active?3:2}px 0 ${active?P.pinkDark:P.border}`,borderRadius:'0'}},m.label);
    b.onclick=()=>setState({mode:m.id,quizStep:0,quizAnswers:[],quizResult:null,routineProducts:STATE.routineProducts,routineResult:null});
    row.appendChild(b);
  });
  const photoBtn=el('button',{style:{fontFamily:"'Press Start 2P',monospace",fontSize:'9px',padding:'7px 11px',cursor:'pointer',background:P.lavDim,color:P.lavender,border:`3px solid ${P.lavender}`,boxShadow:`2px 2px 0 ${P.lavender}`,borderRadius:'0'}},'📷 Tara');
  photoBtn.onclick=()=>alert('Fotoğraf tarama için API gerekiyor. INCI listesini metin olarak yapıştırabilirsiniz.');
  const warnBtn=el('button',{style:{fontFamily:"'Press Start 2P',monospace",fontSize:'9px',padding:'7px 10px',cursor:'pointer',background:P.riskyDim,color:P.risky,border:`3px solid ${P.riskyBorder}`,boxShadow:`2px 2px 0 ${P.riskyBorder}`,borderRadius:'0'}},'⚠️');
  warnBtn.onclick=()=>showModal('disclaimer');
  row.append(photoBtn,warnBtn);
  return row;
}

function render() {
  const root = document.getElementById('root');
  root.innerHTML='';

  const app = div({minHeight:'100vh',background:P.bg,fontFamily:"'DM Sans',sans-serif",position:'relative',overflowX:'hidden'});

  // Header
  const header=div({position:'relative',zIndex:'1',maxWidth:'860px',margin:'0 auto',padding:'18px 16px 14px'});
  const headerRow=div({display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'});
  // Logo
  const logo=el('button',{style:{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'10px'}});
  logo.appendChild(div({background:P.pink,border:`3px solid ${P.pinkDark}`,boxShadow:`3px 3px 0 ${P.pinkDark}`,width:'40px',height:'40px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px'},'🌸'));
  logo.appendChild(div({},div({fontFamily:"'Press Start 2P',monospace",fontSize:'11px',color:P.pink},'DermaDecode'),div({fontSize:'10px',color:P.textLight},'by Dr. Bengi Su Ege')));
  logo.onclick=()=>setState({mode:'home',results:null});
  headerRow.appendChild(logo);
  headerRow.appendChild(buildNav());
  headerRow.appendChild(div({display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',background:P.bgCard,border:`3px solid ${P.pinkLight}`,boxShadow:`2px 2px 0 ${P.pinkLight}`},
    span({fontSize:'22px'},'👩‍⚕️'),
    div({},div({fontSize:'12px',color:P.text,fontWeight:'600'},'Dr. Bengi Su Ege'),div({fontFamily:"'Press Start 2P',monospace",fontSize:'8px',color:P.textLight},'İÇERİK DANIŞMANI'))
  ));
  header.appendChild(headerRow);
  header.appendChild(div({marginTop:'14px',height:'4px',background:`repeating-linear-gradient(90deg,${P.pink} 0,${P.pink} 8px,${P.pinkLight} 8px,${P.pinkLight} 16px)`}));
  app.appendChild(header);

  // Content
  const content=div({position:'relative',zIndex:'1',maxWidth:'860px',margin:'0 auto',padding:'0 16px 80px'});
  let page;
  if(STATE.mode==='home') page=buildHome();
  else if(STATE.mode==='quiz') page=buildQuiz();
  else if(STATE.mode==='analyze') page=buildAnalyze();
  else if(STATE.mode==='compare') page=buildCompare();
  else if(STATE.mode==='routine') page=buildRoutineUI();
  if(page) content.appendChild(page);
  app.appendChild(content);
  root.appendChild(app);
}

// ── GitHub products fetch ─────────────────────────────────────────────────────
(function fetchGH(){
  if(GITHUB_PRODUCTS_URL.includes('KULLANICI_ADI'))return;
  fetch(GITHUB_PRODUCTS_URL+'?t='+Date.now())
    .then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(data=>{
      if(Array.isArray(data)&&data.length>0){
        const ex=new Set(PRODUCT_DATA.map(p=>p.name.toLowerCase()));
        const newOnes=data.filter(p=>p.name&&p.ingredients&&!ex.has(p.name.toLowerCase()));
        STATE.allProducts=[...PRODUCT_DATA,...newOnes];
        render();
      }
    }).catch(()=>{});
})();

addFloatingDeco();
render();

  </script>
